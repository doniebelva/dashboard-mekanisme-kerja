<style>
:root{
  --brand:#1467c0;--brand-d:#0f5aa8;--brand-l:#e8f1fc;--brand-l2:#d6e7fa;
  --gold:#f0a93f;--gold2:#e8951a;
  --ink:#1f2a37;--muted:#6b7280;--line:#e7ebf1;--bg:#f3f6fb;--side:#ffffff;
  --green:#16a34a;--amber:#f59e0b;--red:#e0413a;--blue:#1467c0;--slate:#7b8794;--vio:#7c3aed;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{font-family:"Segoe UI",system-ui,Arial,sans-serif;color:var(--ink);background:var(--bg);font-size:14px}
.app{display:flex;min-height:100vh}
/* topbar penuh lebar ala Satu Kemenkeu */
.appbar{position:fixed;top:0;left:0;right:0;height:58px;z-index:30;
  background:linear-gradient(100deg,var(--brand-d),var(--brand) 60%,#1d7ad6);
  display:flex;align-items:center;gap:14px;padding:0 18px;color:#fff;box-shadow:0 2px 10px rgba(13,60,120,.18)}
.appbar .burger{cursor:pointer;font-size:20px;opacity:.95;padding:4px 6px;border-radius:6px}
.appbar .burger:hover{background:rgba(255,255,255,.12)}
.appbar .logo{display:flex;align-items:center;height:38px}
.appbar .logo img{height:40px;display:block}
.appbar .modul{font-weight:700;font-size:15px;letter-spacing:.2px;opacity:.97}
.appbar .modul small{font-weight:500;opacity:.8;font-size:11.5px;display:block;line-height:1}
.appbar .right{margin-left:auto;display:flex;align-items:center;gap:14px;font-size:13px;opacity:.95}
.appbar .ava{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.22);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
/* sidebar */
.sidebar{width:248px;flex:none;background:var(--side);border-right:1px solid var(--line);
  position:fixed;top:58px;bottom:0;left:0;overflow-y:auto;transition:width .18s;padding:12px 10px;z-index:20}
.sidebar.collapsed{width:60px}
.who{display:flex;align-items:center;gap:10px;padding:8px 8px 12px;border-bottom:1px solid var(--line);margin-bottom:8px}
.who .pic{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--brand),#1d7ad6);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;flex:none}
.who .t{font-weight:700;font-size:12.5px;line-height:1.15;flex:1;min-width:0;overflow:hidden}
.who .t small{display:block;color:var(--muted);font-weight:500;font-size:10.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sidebar.collapsed .who .t,.sidebar.collapsed .grp-lab,.sidebar.collapsed .nav-i .lab,.sidebar.collapsed .side-foot{display:none}
.grp-lab{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:#9aa1ad;font-weight:700;padding:13px 10px 5px}
.nav-i{display:flex;align-items:center;gap:11px;padding:8px 10px;border-radius:8px;cursor:pointer;color:#3b4252;font-weight:600;margin:1px 0;white-space:nowrap;font-size:13.5px;border-left:3px solid transparent}
.nav-i:hover{background:#f1f5fb}
.nav-i.active{background:var(--brand-l);color:var(--brand);border-left-color:var(--brand)}
.nav-i .ic{width:18px;text-align:center;flex:none}
.side-foot{font-size:10px;color:#aab0bb;padding:12px 10px;line-height:1.5;border-top:1px solid var(--line);margin-top:10px}
.collapse-btn{cursor:pointer;color:var(--muted);font-size:16px;background:#f3f6fb;border:1px solid var(--line);border-radius:8px;padding:6px 9px;margin:8px;display:inline-block}
/* main */
.main{flex:1;min-width:0;margin-left:248px;margin-top:58px;display:flex;flex-direction:column;transition:margin .18s;min-height:calc(100vh - 58px)}
.main.wide{margin-left:60px}
.subbar{background:#fff;border-bottom:1px solid var(--line);padding:11px 26px;display:flex;align-items:center;gap:14px;position:sticky;top:58px;z-index:8}
.subbar h1{font-size:16px;margin:0;color:var(--brand-d);font-weight:800}
.crumb{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--muted);flex-wrap:wrap}
.crumb a{color:var(--brand);cursor:pointer;font-weight:600}.crumb a:hover{text-decoration:underline}
.content{padding:20px 26px 70px;max-width:1280px;width:100%}
/* bits */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(176px,1fr));gap:14px;margin-bottom:6px}
.kpi{background:#fff;border:1px solid var(--line);border-radius:10px;padding:16px 14px;display:flex;flex-direction:column;justify-content:center;text-align:center;min-height:106px}
.kpi .lab{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.2px}
.kpi .val{font-size:27px;font-weight:800;color:var(--brand-d);margin-top:6px;line-height:1.05}
.kpi .note{font-size:11px;color:var(--muted);margin-top:6px}
.kpi.alert .val{color:var(--red)}.kpi.good .val{color:var(--green)}.kpi.gold .val{color:var(--gold2)}
h2.sec{font-size:14px;margin:24px 0 12px;color:var(--brand-d);font-weight:800;border-left:4px solid var(--gold);padding-left:10px}
.grid2{display:grid;grid-template-columns:1.45fr 1fr;gap:16px;align-items:stretch}
.grid2.eq{grid-template-columns:1fr 1fr}
.grid2>.card{height:100%}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;align-items:stretch}
.grid3>.card{height:100%}
@media(max-width:900px){.grid2,.grid2.eq{grid-template-columns:1fr}.grid3{grid-template-columns:1fr}}
.card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px;box-shadow:0 1px 2px rgba(20,60,120,.04)}
.card h3{margin:0 0 3px;font-size:13.5px;color:var(--brand-d)}
.card .cap{font-size:11.5px;color:var(--muted);margin-bottom:13px}
.bar-row{display:grid;grid-template-columns:200px 1fr 96px;align-items:center;gap:10px;margin:8px 0;font-size:12.5px}
@media(max-width:560px){.bar-row{grid-template-columns:120px 1fr 72px}}
.bar-row .name{font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-row .name.clk{cursor:pointer}.bar-row .name.clk:hover{color:var(--brand);text-decoration:underline}
.track{background:#eef1f6;border-radius:6px;height:17px;overflow:hidden}
.fill{height:100%;border-radius:6px;background:var(--brand)}
.fill.late{background:var(--red)}.fill.green{background:var(--green)}.fill.gold{background:linear-gradient(90deg,var(--gold2),var(--gold))}
.bar-row .num{text-align:right;font-variant-numeric:tabular-nums;color:var(--muted);font-size:11.5px}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th,td{text-align:left;padding:9px 10px;border-bottom:1px solid var(--line)}
th{background:#f4f8fd;color:var(--brand-d);font-size:10.5px;text-transform:uppercase;letter-spacing:.3px;position:sticky;top:0}
th.srt{cursor:pointer}th.srt:hover{color:var(--brand)}
tbody tr:hover{background:#f7fbff}
td.link{color:var(--brand);cursor:pointer;font-weight:600}td.link:hover{text-decoration:underline}
.num-c{text-align:center;font-variant-numeric:tabular-nums}
.pill{font-size:10.5px;padding:2px 8px;border-radius:20px;font-weight:700;white-space:nowrap}
.pill.on{background:#dcfce7;color:#166534}.pill.off{background:#fde2e1;color:#9b1c17}.pill.warn{background:#fef3c7;color:#92400e}
.pill.neu{background:#eceef2;color:#374151}.pill.blue{background:#dbe9fb;color:#114a8f}.pill.vio{background:#ede9fe;color:#5b21b6}
.mini{font-size:11px;color:var(--muted)}
.note-box{background:#eef5fe;border:1px solid var(--brand-l2);border-radius:10px;padding:11px 15px;font-size:12px;color:#0f4c92;margin:12px 0}
.toolbar{display:flex;gap:9px;align-items:center;margin-bottom:11px;flex-wrap:wrap}
input.search,select.flt{border:1px solid var(--line);border-radius:8px;padding:7px 11px;font-size:12.5px;background:#fff;color:var(--ink)}
input.search{width:230px}
.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:11.5px;color:var(--muted);margin-top:8px}
.dot{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:5px;vertical-align:-1px}
.hm{border-collapse:separate;border-spacing:3px}
.hm td,.hm th{border:none;padding:0}
.hm .rh{font-weight:600;font-size:12px;padding-right:10px;white-space:nowrap;cursor:pointer;max-width:230px;overflow:hidden;text-overflow:ellipsis}
.hm .rh:hover{color:var(--brand)}
.hm .ch{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;text-align:center;padding-bottom:6px}
.hm .cell{width:92px;height:40px;border-radius:7px;text-align:center;vertical-align:middle;font-weight:700;font-size:12.5px;color:#1f2937}
.tree{font-size:13px}
.trow{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:8px;cursor:pointer}
.trow:hover{background:#eef5fe}
.tw{width:16px;text-align:center;color:var(--muted);flex:none;font-size:11px}
.tname{font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tmet{display:flex;gap:6px;align-items:center;flex:none}
.tag{font-size:10.5px;padding:2px 7px;border-radius:6px;background:#eef1f6;color:#475569;font-weight:700}
.tchild{margin-left:18px;border-left:2px solid var(--line);padding-left:6px}
.lvl-ue1 .tname{color:var(--brand-d);font-weight:800}.lvl-team .tname{font-weight:500}
.donut{display:flex;gap:18px;align-items:center;flex-wrap:wrap}
svg{display:block}
.skor{display:inline-flex;align-items:center;gap:6px}
.skor .sb{width:64px;height:9px;border-radius:5px;background:#eef1f6;overflow:hidden;display:inline-block}
.skor .sf{height:100%;border-radius:5px}
/* gantt */
.gantt{font-size:11.5px}
.gt-row{display:grid;grid-template-columns:220px 1fr;align-items:center;gap:8px;margin:3px 0}
@media(max-width:640px){.gt-row{grid-template-columns:120px 1fr}}
.gt-row .gl{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600}
.gt-track{position:relative;height:18px;background:#f4f6fa;border-radius:5px;border:1px solid #eef1f6}
.gt-bar{position:absolute;height:12px;top:2px;border-radius:4px;min-width:3px}
.gt-axis{display:grid;gap:0;margin:2px 0 6px;color:var(--muted);font-size:10px;border-bottom:1px solid var(--line)}
.gt-axis span{text-align:left;padding-bottom:3px;border-left:1px solid #eef1f6;padding-left:3px}
.foot{font-size:11px;color:var(--muted);margin-top:26px;line-height:1.6}
.appfoot{position:fixed;left:0;right:0;bottom:0;z-index:30;background:#fff;border-top:1px solid var(--line);padding:9px 22px;display:flex;justify-content:space-between;align-items:center;font-size:11.5px;color:var(--muted);gap:8px;box-shadow:0 -2px 8px rgba(13,60,120,.06)}
.appfoot b{color:var(--brand-d)}.appfoot .r{color:#9aa1ad}
@media(max-width:640px){.appfoot .r{display:none}}
.gap-row{display:flex;justify-content:space-between;font-size:12.5px;padding:6px 0;border-bottom:1px dashed var(--line)}
.empty{color:var(--muted);font-size:12.5px;padding:20px;text-align:center}
/* login */
.login-wrap{position:fixed;inset:0;z-index:100;background:linear-gradient(120deg,var(--brand-d),var(--brand) 55%,#1d7ad6);display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{background:#fff;border-radius:16px;padding:34px 30px;width:360px;max-width:92vw;box-shadow:0 18px 60px rgba(8,40,90,.35);text-align:center}
.login-card img{height:46px;margin-bottom:14px}
.login-card h2{margin:0 0 2px;font-size:18px;color:var(--brand-d)}
.login-card p{margin:0 0 20px;font-size:12.5px;color:var(--muted)}
.login-card input{width:100%;border:1px solid var(--line);border-radius:9px;padding:11px 13px;font-size:14px;margin-bottom:11px;color:var(--ink)}
.login-card input:focus{outline:none;border-color:var(--brand)}
.login-card button{width:100%;background:var(--brand);color:#fff;border:none;border-radius:9px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;margin-top:4px}
.login-card button:hover{background:var(--brand-d)}
.lerr{color:var(--red);font-size:12px;min-height:16px;margin-bottom:6px}
.login-foot{font-size:10.5px;color:#9aa1ad;margin-top:16px;line-height:1.5}
.appbar .out{cursor:pointer;font-size:12px;opacity:.92;padding:5px 10px;border:1px solid rgba(255,255,255,.35);border-radius:7px}
.appbar .out:hover{background:rgba(255,255,255,.14)}
/* ===== polish ===== */
*{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
html{scroll-behavior:smooth}
.num-c,.kpi .val,.bar-row .num,td.num-c,th.num-c{font-variant-numeric:tabular-nums}
.nav-i,.card,td.link,.pill,.trow,.bar-row .name.clk,.hm .rh,.appbar .out,.login-card button,.login-card input{transition:all .16s ease}
.card{box-shadow:0 1px 3px rgba(20,55,110,.05)}
.kpi{transition:box-shadow .18s ease,transform .18s ease}
.kpi:hover{box-shadow:0 8px 20px rgba(20,55,110,.09);transform:translateY(-2px)}
.card[style*="cursor:pointer"]:hover{box-shadow:0 10px 24px rgba(20,55,110,.13);transform:translateY(-2px);border-color:var(--brand-l2)}
.fill{transition:width .6s cubic-bezier(.22,.7,.2,1)}
.bar-row .name.clk:hover{color:var(--brand)}
tbody tr{transition:background .12s ease}
.appbar{box-shadow:0 2px 12px rgba(13,60,120,.22)}
.appbar .logo img{filter:drop-shadow(0 1px 2px rgba(0,0,0,.18))}
.login-card button:hover{box-shadow:0 8px 20px rgba(20,103,192,.32);transform:translateY(-1px)}
.login-card input:focus{box-shadow:0 0 0 3px rgba(20,103,192,.12)}
h2.sec{letter-spacing:.2px}
.pill{letter-spacing:.2px}
::selection{background:rgba(20,103,192,.18)}
*::-webkit-scrollbar{width:11px;height:11px}
*::-webkit-scrollbar-thumb{background:#c4d0df;border-radius:7px;border:3px solid transparent;background-clip:content-box}
*::-webkit-scrollbar-thumb:hover{background:#a7b6ca;background-clip:content-box}
*::-webkit-scrollbar-track{background:transparent}
#backdrop{display:none}
@media(max-width:760px){
.sidebar{position:fixed;top:58px;bottom:0;left:0;width:250px;padding:12px 10px;border-right:1px solid var(--line);transform:translateX(-102%);transition:transform .22s ease;z-index:40;box-shadow:3px 0 18px rgba(10,30,70,.18)}
.sidebar.open{transform:translateX(0)}
.sidebar.collapsed{width:250px;transform:translateX(-102%)}
.sidebar.collapsed.open{transform:translateX(0)}
.sidebar.collapsed .nav-i .lab,.sidebar.collapsed .who .t,.sidebar.collapsed .grp-lab,.sidebar.collapsed .side-foot{display:block}
.main,.main.wide{margin-left:0}
.content{padding:16px 13px 76px}
.subbar{padding:10px 14px}.appfoot{padding:9px 14px}
.appbar{padding:0 12px;gap:10px}.appbar .modul small{display:none}.appbar .modul{font-size:14px}
#backdrop{display:block;position:fixed;inset:58px 0 0 0;background:rgba(10,25,55,.4);z-index:35;opacity:0;pointer-events:none;transition:opacity .2s}
#backdrop.show{opacity:1;pointer-events:auto}
}
/* ===== polish v2 ===== */
:root{--line:#e9edf3;--bg:#f5f7fb}
@keyframes rise{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
.kpi,.card{animation:rise .24s ease both}
.kpis .kpi:nth-child(2){animation-delay:.04s}.kpis .kpi:nth-child(3){animation-delay:.08s}.kpis .kpi:nth-child(4){animation-delay:.12s}.kpis .kpi:nth-child(5){animation-delay:.16s}
.card{border-radius:13px;padding:17px 18px}
.card h3{font-size:14px;font-weight:700;letter-spacing:.1px}
.card .cap{color:#8a93a3;margin-bottom:14px}
h2.sec{font-size:13px;text-transform:uppercase;letter-spacing:.7px;color:#5b6b82;border-left:none;padding-left:0;display:flex;align-items:center;gap:9px;margin:26px 0 13px}
h2.sec::before{content:"";width:4px;height:15px;border-radius:3px;background:linear-gradient(var(--gold2),var(--gold));display:inline-block}
.kpi{padding:17px 16px}
.kpi .lab{text-transform:uppercase;letter-spacing:.5px;font-size:10.5px}
.kpi .val{letter-spacing:-.5px}
th{padding:11px 13px;background:#f6f9fd;color:#52627a;font-weight:700;border-bottom:1px solid #e3e9f1}
td{padding:10px 13px;border-bottom:1px solid #eef2f7}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:#f3f8ff}
.track{height:15px;background:#eef2f7}
.bar-row{margin:9px 0}
.pill{padding:3px 9px;font-weight:600}
.note-box{border-radius:12px;padding:13px 16px;line-height:1.55}
.tag{border-radius:7px}
.crumb a:hover{color:var(--brand-d)}
.subbar h1{letter-spacing:-.2px}
.grid2,.grid2.eq,.grid3{gap:18px}
.bkt{border:1px solid var(--line);border-radius:11px;padding:12px 13px;background:#fcfdff;transition:box-shadow .16s,transform .16s,border-color .16s}
.bkt:hover{box-shadow:0 6px 16px rgba(20,55,110,.09);transform:translateY(-2px);border-color:var(--brand-l2)}
.gt-bar{border-radius:5px;box-shadow:inset 0 -1px 0 rgba(0,0,0,.06)}
.gt-track{border-radius:6px}
.gt-row .gl{font-size:11.5px}
</style>
</head>

<script>
const FULL = {"summary":{"tanggal_olah":"","task":{"anomali":0,"tak_terukur":0}},"teams":[],"pegawai":[],"ue1":{},"ue2":{},"trend":[],"trend_ue1":{},"trend_ue2":{},"skills_catalog":[]};
let DATA = FULL;
const ACCOUNTS = [];
function scopeData(sc){
  if(sc.type==='all') return FULL;
  const inT = t => sc.type==='ue1' ? t.ue1===sc.ue1 : (t.ue1===sc.ue1 && t.ue2===sc.ue2);
  const inMem = tt => sc.type==='ue1' ? tt.ue1===sc.ue1 : (tt.ue1===sc.ue1 && tt.ue2===sc.ue2);
  const teams = FULL.teams.filter(inT);
  const pegawai = FULL.pegawai.filter(p => (p.teams||[]).some(inMem));
  const blank = () => ({jml_tim:0,tim_aktif:0,regular:0,squad:0,anggota:0,task_total:0,telat:0,tepat:0,overdue:0,belum:0,status:{},peg:new Set()});
  const u1={},u2={};
  function add(map,key,t){if(!map[key])map[key]=blank();const a=map[key];a.jml_tim++;a.anggota+=(t.jml_anggota||0);a[t.jenis==='Squad Tim'?'squad':'regular']++;a.status[t.status]=(a.status[t.status]||0)+1;if(t.punya_task){a.tim_aktif++;const k=t.task;a.task_total+=k.total;a.telat+=k.telat;a.tepat+=k.selesai_tepat;a.overdue+=k.overdue;a.belum+=k.belum_selesai;}(t.anggota||[]).forEach(m=>a.peg.add(m.id));}
  teams.forEach(t=>{add(u1,t.ue1,t);add(u2,t.ue1+'||'+t.ue2,t);});
  const ser=a=>{const done=a.telat+a.tepat;return {jml_tim:a.jml_tim,tim_aktif:a.tim_aktif,adopsi_pct:a.jml_tim?Math.round(1000*a.tim_aktif/a.jml_tim)/10:0,regular:a.regular,squad:a.squad,anggota:a.anggota,pegawai_unik:a.peg.size,task_total:a.task_total,telat:a.telat,tepat:a.tepat,overdue:a.overdue,belum:a.belum,telat_pct:done?Math.round(1000*a.telat/done)/10:null,status:a.status};};
  const ue1={};Object.keys(u1).forEach(k=>ue1[k]=ser(u1[k]));
  const ue2={};Object.keys(u2).forEach(k=>ue2[k]=ser(u2[k]));
  const tk={total:0,selesai_tepat:0,telat:0,berjalan:0,belum_mulai:0,belum_selesai:0,overdue:0,tak_terukur:0,anomali:0,strategic:0,operational:0};
  const statusTim={};let reg=0,sq=0,aktif=0;
  teams.forEach(t=>{statusTim[t.status]=(statusTim[t.status]||0)+1;if(t.jenis==='Squad Tim')sq++;else reg++;if(t.punya_task){aktif++;const x=t.task;['total','selesai_tepat','telat','berjalan','belum_mulai','belum_selesai','overdue','tak_terukur','strategic','operational','anomali'].forEach(f=>tk[f]+=(x[f]||0));}});
  const done=tk.telat+tk.selesai_tepat;
  const sized={};teams.forEach(t=>{const nn=t.jml_anggota||0;const b=nn<=3?'1-3':nn<=6?'4-6':nn<=10?'7-10':nn<=20?'11-20':'21+';sized[b]=(sized[b]||0)+1;});
  const workd={};pegawai.forEach(p=>{const n=(p.teams||[]).filter(inMem).length;const k=n>=4?'4+':String(n);workd[k]=(workd[k]||0)+1;});
  const summary=Object.assign({},FULL.summary,{total_tim:teams.length,tim_aktif:aktif,adopsi_pct:teams.length?Math.round(1000*aktif/teams.length)/10:0,total_pegawai:pegawai.length,pegawai_dalam_tim:pegawai.length,regular:reg,squad:sq,status_tim:statusTim,task:tk,telat_pct:done?Math.round(1000*tk.telat/done)/10:0,karakteristik:{Strategic:tk.strategic,Operational:tk.operational},size_dist:sized,work_dist:workd,n_ue1:Object.keys(ue1).length});
  const trend = sc.type==='ue1' ? ((FULL.trend_ue1||{})[sc.ue1]||[]) : ((FULL.trend_ue2||{})[sc.ue1+'||'+sc.ue2]||[]);
  return {summary,ue1,ue2,teams,pegawai,trend,trend_ue1:FULL.trend_ue1,trend_ue2:FULL.trend_ue2,skills_catalog:FULL.skills_catalog};
}
function initials(s){const w=String(s||'').trim().split(/\s+/);return ((w[0]||'')[0]||'').toUpperCase()+((w[1]||'')[0]||'').toUpperCase()||'MK';}
const fmt=n=>(n==null?'-':n.toLocaleString('id-ID'));
const pct=n=>(n==null?'-':n+'%');
const esc=s=>(s==null?'':String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'));
const colorAdopt=p=>p>=40?'var(--green)':p>=10?'var(--amber)':'var(--red)';
const skorColor=s=>s==null?'#cbd5e1':s>=70?'var(--green)':s>=40?'var(--amber)':'var(--red)';
const statusPill=s=>{const m={'Pelaksanaan':'on','Penetapan':'blue','Rekrutmen':'warn','Seleksi':'neu'};return `<span class="pill ${m[s]||'neu'}">${esc(s)}</span>`;};
const STC={tepat:'#16a34a',telat:'#e0413a',berjalan:'#2f86d8',belum:'#94a3b8',overdue:'#f59e0b',tak_terukur:'#64748b','':'#cbd5e1'};
function prioPill(p){const m={Urgent:'off',Important:'warn',Medium:'neu',Low:'neu'};return `<span class="pill ${m[p]||'neu'}">${esc(p||'-')}</span>`;}
function taskPill(s){const m={tepat:['on','Tepat'],telat:['off','Telat'],berjalan:['blue','Berjalan'],belum:['neu','Belum mulai'],overdue:['warn','Overdue'],tak_terukur:['on','Selesai']};const x=m[s]||['neu',s||'-'];return `<span class="pill ${x[0]}">${x[1]}</span>`;}
function board(buckets){if(!buckets||!buckets.length)return '';
  let h='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px">';
  buckets.forEach(b=>{const tot=b.total||1;const ontime=Math.max(0,b.selesai-b.telat);
    const seg=[['#16a34a',ontime],['#e0413a',b.telat],['#2f86d8',b.berjalan],['#f59e0b',b.overdue],['#94a3b8',b.belum]];
    let bs='';seg.forEach(([c,v])=>{if(v>0)bs+=`<span style="width:${100*v/tot}%;background:${c}"></span>`;});
    h+=`<div class="bkt">
      <div style="font-weight:700;font-size:12.5px;color:var(--brand-d);overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(b.nama)}">${esc(b.nama)}</div>
      <div class="mini" style="margin:3px 0 7px">${b.total} task</div>
      <div style="display:flex;height:9px;border-radius:5px;overflow:hidden;background:#eef1f6">${bs}</div>
      <div class="mini" style="margin-top:7px;display:flex;flex-wrap:wrap;gap:9px">
        <span style="color:#16a34a">&#9679;${b.selesai} selesai</span>${b.berjalan?`<span style="color:#2f86d8">&#9679;${b.berjalan} jalan</span>`:''}${b.overdue?`<span style="color:#f59e0b">&#9679;${b.overdue} overdue</span>`:''}${b.belum?`<span style="color:#94a3b8">&#9679;${b.belum} belum</span>`:''}</div></div>`;});
  return h+'</div>';}
function taskTable(tasks){if(!tasks||!tasks.length)return '<div class="empty">Tidak ada data task.</div>';
  const ord={overdue:0,telat:1,berjalan:2,belum:3,tak_terukur:4,tepat:5};
  const ts=tasks.slice().sort((a,b)=>(a.bucket||'').localeCompare(b.bucket||'','id')||((ord[a.status]??9)-(ord[b.status]??9)));
  let h='<table><thead><tr><th>Task</th><th>Bucket</th><th>PIC</th><th>Prioritas</th><th>Status</th><th>Tenggat</th></tr></thead><tbody>';
  ts.forEach(t=>h+=`<tr><td>${esc(t.nama)}</td><td class="mini">${esc(t.bucket)}</td><td class="mini">${esc(t.pic)}</td><td>${prioPill(t.prio)}</td><td>${taskPill(t.status)}</td><td class="mini">${t.tenggat||'-'}</td></tr>`);
  return h+'</tbody></table>';}
function skorCell(s){if(s==null)return '<span class="mini">-</span>';return `<span class="skor"><span class="sb"><span class="sf" style="width:${Math.max(3,s)}%;background:${skorColor(s)}"></span></span>${s}</span>`;}

const NAV=[

function bar(name,val,max,cls,num,act){const w=max?Math.max(2,Math.round(100*val/max)):0;
  const a=act?`data-act="${act.a}" ${act.d||''}`:'';
  return `<div class="bar-row"><div class="name ${act?'clk':''}" ${a} title="${esc(name)}">${esc(name)}</div><div class="track"><div class="fill ${cls||''}" style="width:${w}%"></div></div><div class="num">${num}</div></div>`;}
function donut(parts,size,center){const tot=parts.reduce((s,p)=>s+p.v,0)||1;const r=size/2-6,cx=size/2,cy=size/2;let a=-Math.PI/2,segs='';
  parts.forEach(p=>{const ang=2*Math.PI*p.v/tot;const x1=cx+r*Math.cos(a),y1=cy+r*Math.sin(a);a+=ang;const x2=cx+r*Math.cos(a),y2=cy+r*Math.sin(a);const lg=ang>Math.PI?1:0;
    segs+=`<path d="M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${lg} 1 ${x2},${y2} Z" fill="${p.c}" stroke="#fff" stroke-width="1.5"/>`;});
  let ctr='';
  if(center){ctr=`<text x="${cx}" y="${cy-1}" text-anchor="middle" font-size="${(size*0.2).toFixed(0)}" font-weight="800" fill="var(--brand-d)">${center.big}</text><text x="${cx}" y="${(cy+size*0.13).toFixed(0)}" text-anchor="middle" font-size="${(size*0.078).toFixed(0)}" fill="#8a93a3" letter-spacing="1">${center.small}</text>`;}
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${segs}<circle cx="${cx}" cy="${cy}" r="${r*0.62}" fill="#fff"/>${ctr}</svg>`;}

  const maxTim=Math.max(...ue1.map(u=>u.jml_tim));const zero=ue1.filter(u=>u.tim_aktif===0).sort((a,b)=>b.jml_tim-a.jml_tim);
  let h=`<div class="kpis">
    <div class="kpi"><div class="lab">Total Tim Kerja</div><div class="val">${fmt(s.total_tim)}</div><div class="note">${s.regular} regular &middot; ${s.squad} squad</div></div>
    <div class="kpi ${s.adopsi_pct<30?'alert':'good'}"><div class="lab">Tim Aktif</div><div class="val">${pct(s.adopsi_pct)}</div><div class="note">${s.tim_aktif}/${s.total_tim} pakai submodul penugasan</div></div>
    <div class="kpi gold"><div class="lab">Pegawai dalam Tim</div><div class="val">${fmt(s.pegawai_dalam_tim)}</div><div class="note">dari ${fmt(s.total_pegawai)} pegawai</div></div>

    <div class="kpi"><div class="lab">UE1 Terlibat</div><div class="val">${s.n_ue1}</div><div class="note">unit eselon I</div></div></div>
  <div class="note-box"><b>Sorotan pimpinan:</b> baru <b>${pct(s.adopsi_pct)}</b> tim yang benar-benar berkegiatan di submodul penugasan. Mendorong seluruh UE1 ke tingkat keaktifan tertinggi menjadi prioritas adopsi.</div>
  <h2 class="sec">Adopsi per Unit Eselon I &middot; klik untuk menelusuri</h2>
  <div class="grid2"><div class="card"><h3>Jumlah tim &amp; tingkat keaktifan</h3><div class="cap">Batang = jumlah tim; angka = % tim aktif (hijau &ge;40, kuning &ge;10, merah &lt;10).</div>`;
  ue1.forEach(u=>{h+=`<div class="bar-row"><div class="name clk" data-act="ue1" data-ue1="${esc(u.k)}" title="${esc(u.k)}">${esc(u.k)}</div><div class="track"><div class="fill" style="width:${Math.max(2,Math.round(100*u.jml_tim/maxTim))}%"></div></div><div class="num"><b style="color:${colorAdopt(u.adopsi_pct)}">${u.adopsi_pct}%</b> &middot; ${u.jml_tim}</div></div>`;});
  h+=`</div><div class="card"><h3>Status siklus tim</h3><div class="cap">Komposisi seluruh tim.</div><div class="donut"><div>${donut(Object.entries(s.status_tim).map(([k,v])=>({v,c:{'Pelaksanaan':'#16a34a','Penetapan':'#1467c0','Rekrutmen':'#f59e0b','Seleksi':'#94a3b8'}[k]||'#cbd5e1'})),158,{big:s.total_tim,small:'TIM'})}</div><div>`;
  const stc={'Pelaksanaan':'#16a34a','Penetapan':'#1467c0','Rekrutmen':'#f59e0b','Seleksi':'#94a3b8'};
  Object.entries(s.status_tim).sort((a,b)=>b[1]-a[1]).forEach(([k,v])=>h+=`<div style="margin:5px 0"><span class="dot" style="background:${stc[k]||'#cbd5e1'}"></span>${k}: <b>${v}</b></div>`);
  h+=`</div></div><div style="margin-top:16px"><h3>Hasil penyelesaian task</h3><div class="cap">Dihitung ulang dari tanggal; ${fmt(s.task.anomali)} anomali dibuang.</div>`;

  return h+`</div>`;
}

/* ===== Insight & Rekomendasi ===== */
function vInsight(){
  const today=Date.parse((DATA.summary&&DATA.summary.tanggal_olah)||'2026-06-21');
  const F=[];
  const add=(sev,cat,judul,bukti,rekom,act)=>F.push({sev,cat,judul,bukti,rekom,act});
  const topBucket=(t,key)=>{let b=null;(t.buckets||[]).forEach(x=>{if(x[key]>0&&(!b||x[key]>b[key]))b=x;});return b;};
  const busiest=(t)=>{let m=null;(t.anggota||[]).forEach(x=>{if(!m||(x.jml_task||0)>(m.jml_task||0))m=x;});return m;};
  const unitOntime=(t)=>{const u2=DATA.ue2[t.ue1+'||'+t.ue2],u1=DATA.ue1[t.ue1];const tp=(u2&&u2.telat_pct!=null)?u2.telat_pct:(u1?u1.telat_pct:null);return tp==null?null:{pct:100-tp,nama:(u2&&u2.telat_pct!=null)?t.ue2:t.ue1};};
  DATA.teams.forEach((t,i)=>{const tk=t.task;if(!tk)return;
    const A=`data-act="team" data-team="${i}"`;
    const done=tk.selesai_tepat+tk.telat;const comp=Math.round(100*done/Math.max(1,tk.total));
    if(tk.overdue>=5 && tk.overdue/tk.total>=0.2){
      const b=topBucket(t,'overdue');
      const rk=b?`Overdue terpusat di bucket "${esc(b.nama)}" (${b.overdue} dari ${b.total} task). Prioritaskan bucket itu, tetapkan PIC, dan jadwalkan ulang tenggat yang realistis.`:'Jadwalkan ulang task yang lewat tenggat dan tetapkan PIC penanggung jawab.';
      add(tk.overdue>=20?'tinggi':'sedang','Overdue',t.nama,`${tk.overdue} task lewat tenggat (${Math.round(100*tk.overdue/tk.total)}% dari ${tk.total} task)`,rk,A);}
    if(t.tepat_pct!=null && t.tepat_pct<50 && done>=10){
      const u=unitOntime(t);const m=busiest(t);
      const rk=`${u?`Ketepatan ${t.tepat_pct}% vs rata-rata ${esc(u.nama)} ${u.pct}%. `:''}Evaluasi estimasi waktu & beban${m?`; beban terberat di ${esc(m.nama)} (${m.jml_task} task)`:''}; perkuat monitoring mingguan.`;
      add(t.tepat_pct<30?'tinggi':'sedang','Ketepatan',t.nama,`hanya ${t.tepat_pct}% selesai tepat waktu (dari ${done} task selesai)`,rk,A);}
    else if(t.skor!=null && t.skor<40 && tk.total>=8){
      const m=busiest(t);
      add('sedang','Skor rendah',t.nama,`skor indikatif ${t.skor} (penyelesaian ${comp}%, ketepatan ${t.tepat_pct==null?'-':t.tepat_pct+'%'})`,`Dampingi penyelesaian & cek pembagian beban ${t.jml_anggota} anggota${m?` (terberat: ${esc(m.nama)}, ${m.jml_task} task)`:''}.`,A);}
    if(tk.belum_mulai>=10 && tk.belum_mulai/tk.total>=0.4){
      const b=topBucket(t,'belum');
      add('sedang','Stagnan',t.nama,`${tk.belum_mulai} task belum dimulai (${Math.round(100*tk.belum_mulai/tk.total)}%)`,`${(b&&b.belum>=3)?`Terbanyak tertahan di bucket "${esc(b.nama)}" (${b.belum} belum mulai). `:''}Tetapkan PIC tiap task dan bagi ke ${t.jml_anggota} anggota agar mulai berjalan.`,A);}
    if(t.selesai){const days=Math.round((Date.parse(t.selesai)-today)/86400000);
      if(days>=0 && days<=30 && comp<60){
        const sisa=tk.belum_selesai;const perHari=days>0?Math.ceil(sisa/days):sisa;
        add('tinggi','Tenggat dekat',t.nama,`periode berakhir ${days} hari lagi, progres baru ${comp}% (sisa ${sisa} task)`,`Perlu rata-rata ~${perHari} task/hari untuk tuntas. Fokuskan ke prioritas tinggi, pertimbangkan tambah anggota atau revisi target/SK.`,A);}}
  });
  Object.keys(DATA.ue1).forEach(k=>{const u=DATA.ue1[k];
    if(u.tim_aktif===0 && u.jml_tim>=5){
      const pel=(u.status&&u.status['Pelaksanaan'])||0;
      add('sedang','Adopsi',k,`${u.jml_tim} tim & ${u.pegawai_unik} pegawai, namun 0% aktif di submodul penugasan`,`Mulai aktivasi dari ${pel||u.jml_tim} tim berstatus Pelaksanaan; tetapkan target pencatatan penugasan per tim.`,`data-act="ue1" data-ue1="${esc(k)}"`);}});
  DATA.pegawai.forEach(p=>{if(p.jml_tim>=3 && p.perf && p.perf.overdue>=3)
    add('sedang','Beban',p.nama,`tergabung di ${p.jml_tim} tim, ${p.perf.overdue} task overdue, ketepatan ${p.perf.tepat_pct==null?'-':p.perf.tepat_pct+'%'}`,`Beban di atas wajar (${p.jml_tim} tim). Pertimbangkan kurangi keanggotaan atau redistribusi task ke rekan dengan beban lebih ringan.`,`data-act="emp" data-emp="${p.id}"`);});
  const rank={tinggi:0,sedang:1,info:2};F.sort((a,b)=>rank[a.sev]-rank[b.sev]);
  let rows=F;if(state.insCat)rows=rows.filter(x=>x.cat===state.insCat);
  const nT=F.filter(x=>x.sev==='tinggi').length,nS=F.filter(x=>x.sev==='sedang').length;
  const cats=[...new Set(F.map(x=>x.cat))];
  const sevPill={tinggi:'off',sedang:'warn',info:'blue'},sevTxt={tinggi:'Prioritas Tinggi',sedang:'Perlu Perhatian',info:'Info'};
  let h=`<div class="kpis">
    <div class="kpi"><div class="lab">Total Temuan</div><div class="val">${F.length}</div><div class="note">dari data tim &amp; penugasan</div></div>
    <div class="kpi alert"><div class="lab">Prioritas Tinggi</div><div class="val">${nT}</div></div>
    <div class="kpi gold"><div class="lab">Perlu Perhatian</div><div class="val">${nS}</div></div>
    <div class="kpi good"><div class="lab">Tim Aktif Dipindai</div><div class="val">${DATA.teams.filter(t=>t.punya_task).length}</div></div></div>
  <div class="note-box">Temuan dihasilkan otomatis dari aturan ambang (overdue, ketepatan, skor, stagnasi, tenggat, adopsi, beban). Sifatnya indikatif untuk membantu prioritas tindak lanjut, bukan penilaian final.</div>
  <div class="toolbar"><select class="flt" id="insCat"><option value="">Semua kategori</option>${cats.map(c=>`<option ${state.insCat===c?'selected':''}>${esc(c)}</option>`).join('')}</select><span class="mini">${rows.length} temuan ditampilkan</span></div>`;
  if(!rows.length){h+=`<div class="card"><div class="empty">Tidak ada potensi masalah terdeteksi untuk lingkup ini. 👍</div></div>`;return h;}
  rows.slice(0,60).forEach(x=>{const col=x.sev==='tinggi'?'var(--red)':x.sev==='sedang'?'var(--gold2)':'var(--brand)';
    h+=`<div class="card" style="display:flex;gap:13px;align-items:flex-start;border-left:4px solid ${col};margin-bottom:11px;padding:13px 16px">
      <div style="flex:1;min-width:0">
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:4px"><span class="pill ${sevPill[x.sev]}">${sevTxt[x.sev]}</span><span class="pill neu">${esc(x.cat)}</span><span class="link" ${x.act} style="font-weight:700">${esc(x.judul)}</span></div>
        <div class="mini" style="margin-bottom:5px">${esc(x.bukti)}</div>
        <div style="font-size:12.5px;color:#33415a"><b style="color:var(--brand-d)">Rekomendasi:</b> ${esc(x.rekom)}</div>
      </div></div>`;});
  if(rows.length>60)h+=`<div class="mini" style="padding:6px">Menampilkan 60 dari ${rows.length} temuan.</div>`;
  return h;
}

/* ===== helper grafik garis ===== */
function trendChart(tr,series,ymax,pct){
  if(!tr.length) return '<div class="empty">Belum ada aktivitas penyelesaian untuk lingkup ini.</div>';
  const W=440,H=188,padL=32,padR=12,padT=12,padB=26,nT=tr.length;
  ymax=ymax||1;
  const X=i=>padL+(W-padL-padR)*(nT<=1?0:i/(nT-1));
  const Y=v=>H-padB-(Math.max(0,Math.min(ymax,v))/ymax)*(H-padT-padB);
  const MO=['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
  let grid='',ylab='';
  for(let g=0;g<=2;g++){const val=ymax*g/2,gy=Y(val);
    grid+=`<line x1="${padL}" y1="${gy.toFixed(1)}" x2="${W-padR}" y2="${gy.toFixed(1)}" stroke="#eef1f6"/>`;
    ylab+=`<text x="${padL-5}" y="${(gy+3).toFixed(1)}" font-size="8.5" fill="#9aa1ad" text-anchor="end">${pct?Math.round(val)+'%':fmt(Math.round(val))}</text>`;}
  let body='';
  series.forEach(se=>{
    const pts=tr.map((t,i)=>{const v=se.f(t);return v==null?null:[X(i),Y(v)];}).filter(Boolean);
    if(!pts.length)return;
    if(se.area)body+=`<polygon points="${pts[0][0].toFixed(1)},${H-padB} ${pts.map(p=>p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ')} ${pts[pts.length-1][0].toFixed(1)},${H-padB}" fill="${se.c}" opacity="0.10"/>`;
    body+=`<polyline points="${pts.map(p=>p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ')}" fill="none" stroke="${se.c}" stroke-width="2.2"/>`;
    body+=pts.map(p=>`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="2.5" fill="#fff" stroke="${se.c}" stroke-width="1.6"/>`).join('');
  });
  let xl='';tr.forEach((t,i)=>{const mm=t.bulan.slice(5),yy=t.bulan.slice(2,4);let lab=MO[(parseInt(mm)||1)-1];if(mm==='01'||i===0)lab+=" '"+yy;xl+=`<text x="${X(i).toFixed(1)}" y="${H-8}" font-size="8.5" fill="#8a93a3" text-anchor="middle">${lab}</text>`;});
  return `<svg width="100%" viewBox="0 0 ${W} ${H}">${grid}${ylab}<line x1="${padL}" y1="${H-padB}" x2="${W-padR}" y2="${H-padB}" stroke="#dfe4ec"/>${body}${xl}</svg>`;
}

  if(!ue1.length)h+=`<div class="empty">Belum ada unit dengan task.</div>`;
  return h+`</div>`;
}

/* ===== Heatmap ===== */
function vHeatmap(){
  const ue1=Object.entries(DATA.ue1).map(([k,v])=>({k,...v})).sort((a,b)=>b.jml_tim-a.jml_tim);
  const cols=[{k:'jml_tim',lab:'Jml Tim',dir:0},{k:'adopsi_pct',lab:'% Adopsi',dir:1},{k:'pegawai_unik',lab:'Pegawai',dir:0},{k:'task_total',lab:'Task',dir:0},{k:'telat_pct',lab:'% Telat',dir:-1},{k:'overdue',lab:'Overdue',dir:-1}];
  const rng={};cols.forEach(c=>{const v=ue1.map(u=>u[c.k]).filter(x=>x!=null);rng[c.k]=[Math.min(...v),Math.max(...v)];});

    if(c.dir===1)return `rgb(${Math.round(222-130*t)},${Math.round(238-20*t)},${Math.round(220-150*t)})`;
    if(c.dir===-1)return `rgb(${Math.round(224+24*t)},${Math.round(232-150*t)},${Math.round(222-150*t)})`;

  <div class="card" style="overflow-x:auto"><table class="hm"><tr><th class="ch" style="text-align:left">Unit Eselon I</th>`;

/* ===== helper ranking & kuadran ===== */
function medal(i){return ['🥇','🥈','🥉'][i]||`<b style="color:var(--muted)">${i+1}</b>`;}
function rankRow(i,name,right,metric,color,sub,act){
  return `<div style="display:flex;align-items:center;gap:10px;padding:7px 2px;border-bottom:1px solid var(--line);${act?'cursor:pointer':''}" ${act||''}>
    <div style="width:22px;text-align:center;font-size:14px">${medal(i)}</div>
    <div style="flex:1;min-width:0">
      <div style="display:flex;justify-content:space-between;gap:8px"><span style="font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;${act?'color:var(--brand)':''}">${name}</span><span class="mini" style="white-space:nowrap">${right}</span></div>
      <div class="track" style="height:7px;margin-top:4px"><div class="fill" style="width:${Math.max(3,metric)}%;background:${color}"></div></div>
      ${sub?`<div class="mini" style="margin-top:2px">${sub}</div>`:''}</div></div>`;}
function quadrant(points,xlab,ylab,ql,sizeLabel){
  const W=560,H=362,p=46,pw=W-p*2,ph=H-p*2;
  const sx=x=>p+pw*Math.max(0,Math.min(100,x))/100, sy=y=>p+ph*(1-Math.max(0,Math.min(100,y))/100);
  const bg=`<rect x="${p}" y="${p}" width="${pw/2}" height="${ph/2}" fill="rgba(37,99,235,.05)"/><rect x="${p+pw/2}" y="${p}" width="${pw/2}" height="${ph/2}" fill="rgba(22,163,74,.07)"/><rect x="${p}" y="${p+ph/2}" width="${pw/2}" height="${ph/2}" fill="rgba(224,65,58,.05)"/><rect x="${p+pw/2}" y="${p+ph/2}" width="${pw/2}" height="${ph/2}" fill="rgba(245,158,11,.06)"/>`;
  const mid=`<line x1="${p}" y1="${(p+ph/2).toFixed(1)}" x2="${W-p}" y2="${(p+ph/2).toFixed(1)}" stroke="#dfe4ec" stroke-dasharray="4 4"/><line x1="${(p+pw/2).toFixed(1)}" y1="${p}" x2="${(p+pw/2).toFixed(1)}" y2="${H-p}" stroke="#dfe4ec" stroke-dasharray="4 4"/><line x1="${p}" y1="${p}" x2="${p}" y2="${H-p}" stroke="#cbd5e1"/><line x1="${p}" y1="${H-p}" x2="${W-p}" y2="${H-p}" stroke="#cbd5e1"/>`;
  const halo='stroke="#fff" stroke-width="3.5" paint-order="stroke" stroke-linejoin="round"';
  const lbl=`<text x="${W-p-7}" y="${p+15}" text-anchor="end" font-size="11.5" font-weight="800" fill="#15893f" ${halo}>${ql[0]}</text><text x="${p+7}" y="${p+15}" font-size="11.5" font-weight="800" fill="#2563eb" ${halo}>${ql[1]}</text><text x="${W-p-7}" y="${H-p-8}" text-anchor="end" font-size="11.5" font-weight="800" fill="#d6890f" ${halo}>${ql[2]}</text><text x="${p+7}" y="${H-p-8}" font-size="11.5" font-weight="800" fill="#d63a33" ${halo}>${ql[3]}</text>`;
  const ticks=`<text x="${p}" y="${H-p+14}" font-size="8.5" fill="#aab2bf">rendah</text><text x="${W-p}" y="${H-p+14}" text-anchor="end" font-size="8.5" fill="#aab2bf">tinggi</text><text x="${p-8}" y="${H-p}" text-anchor="end" font-size="8.5" fill="#aab2bf">rendah</text><text x="${p-8}" y="${p+8}" text-anchor="end" font-size="8.5" fill="#aab2bf">tinggi</text>`;
  const dots=points.map(pt=>`<circle cx="${sx(pt.x).toFixed(1)}" cy="${sy(pt.y).toFixed(1)}" r="${pt.r.toFixed(1)}" fill="${pt.color}" stroke="#fff" stroke-width="1.2"><title>${esc(pt.label)}</title></circle>`).join('');
  const al=`<text x="${W/2}" y="${H-5}" text-anchor="middle" font-size="11" font-weight="600" fill="#5b6b82">${xlab}</text><text x="12" y="${H/2}" text-anchor="middle" font-size="11" font-weight="600" fill="#5b6b82" transform="rotate(-90 12 ${H/2})">${ylab}</text>`;
  const svg=`<svg width="100%" viewBox="0 0 ${W} ${H}">${bg}${mid}${ticks}${lbl}${dots}${al}</svg>`;
  const leg=sizeLabel?`<div class="legend" style="margin-top:8px;align-items:center"><span style="color:#5b6b82">Ukuran bulatan = jumlah ${sizeLabel}:</span><span><svg width="13" height="13" style="vertical-align:middle"><circle cx="6" cy="8" r="3" fill="#b6c0cd"/></svg> sedikit</span><span><svg width="22" height="16" style="vertical-align:middle"><circle cx="9" cy="9" r="6.5" fill="#b6c0cd"/></svg> banyak</span></div>`:'';
  return svg+leg;}
function histBars(counts,labels){const m=Math.max(...counts,1);let h='';counts.forEach((c,i)=>h+=bar(labels[i],c,m,'',fmt(c)+' tim'));return h;}

/* ===== Ketersediaan Pegawai ===== */
function availStatus(p){const pf=p.perf;const open=pf?(pf.total-pf.selesai):0;const over=pf?pf.overdue:0;const jt=p.jml_tim;
  if(over>0||jt>=3||open>=15)return 'sibuk';if(open===0&&jt<=1)return 'tersedia';return 'terbatas';}
function availPill(s){const m={tersedia:['on','Tersedia'],terbatas:['warn','Terbatas'],sibuk:['off','Sibuk']};const x=m[s];return `<span class="pill ${x[0]}">${x[1]}</span>`;}
function vAvail(){
  const all=DATA.pegawai.map(p=>({p,st:availStatus(p),open:p.perf?(p.perf.total-p.perf.selesai):0,over:p.perf?p.perf.overdue:0}));
  const cnt={tersedia:0,terbatas:0,sibuk:0};all.forEach(o=>cnt[o.st]++);
  const wp=all.filter(o=>o.p.perf);const opens=wp.map(o=>o.open).sort((a,b)=>a-b);const p90=opens[Math.floor(opens.length*0.9)]||1;
  const sc={tersedia:'rgba(22,163,74,.6)',terbatas:'rgba(224,149,26,.62)',sibuk:'rgba(224,65,58,.6)'};
  const pts=wp.map(o=>({x:Math.min(100,100*o.open/(p90||1)),y:o.p.perf.tepat_pct||0,r:Math.max(3,Math.min(14,Math.sqrt(o.p.perf.total))),label:`${o.p.nama} · ${o.open} task terbuka`,color:sc[o.st]}));
  let rows=all.slice();

  rows.sort((a,b)=>rk[a.st]-rk[b.st]||a.open-b.open||((b.p.perf?b.p.perf.tepat_pct||0:0)-(a.p.perf?a.p.perf.tepat_pct||0:0)));
  const ue1opts=[...new Set(DATA.pegawai.map(p=>p.ue1))].sort();
  const colSt=s=>s==='tersedia'?'var(--green)':s==='terbatas'?'var(--gold2)':'var(--red)';
  let h=`<div class="kpis">
    <div class="kpi good"><div class="lab">Tersedia</div><div class="val">${cnt.tersedia}</div><div class="note">kapasitas longgar</div></div>
    <div class="kpi gold"><div class="lab">Terbatas</div><div class="val">${cnt.terbatas}</div><div class="note">masih ada task berjalan</div></div>
    <div class="kpi alert"><div class="lab">Sibuk / Berisiko</div><div class="val">${cnt.sibuk}</div><div class="note">overdue / beban tinggi</div></div>
    <div class="kpi"><div class="lab">Total Pegawai</div><div class="val">${fmt(DATA.pegawai.length)}</div></div></div>
  <div class="note-box">Status ketersediaan diperkirakan dari beban kerja (jumlah tim, task belum selesai, overdue). Akan lebih akurat setelah data kapasitas/cuti dan keahlian (uraian jabatan) ditambahkan, sejalan fungsi Expert Locator pada UR.</div>
  <div class="grid2"><div class="card"><h3>Peta Ketersediaan</h3><div class="cap">X: beban (task terbuka) &middot; Y: keandalan (on-time%) &middot; ukuran: total task. Pojok kiri-atas = ideal ditunjuk. Hijau tersedia, kuning terbatas, merah sibuk.</div>${quadrant(pts,'Beban (task terbuka) →','% Tepat waktu →',['Andal tapi padat','Ideal ditunjuk','Kelebihan beban','Luang, perlu bimbingan'],'total task')}</div>
    <div class="card"><h3>✅ Kandidat Paling Tersedia</h3><div class="cap">Urut ketersediaan lalu keandalan. Klik untuk detail.</div>`;
  rows.slice(0,10).forEach((o,i)=>{const p=o.p;h+=rankRow(i,esc(p.nama),availPill(o.st),(p.perf?p.perf.tepat_pct||0:0),colSt(o.st),`${p.jml_tim} tim &middot; ${o.open} terbuka &middot; ${o.over} overdue &middot; ${esc(p.ue1)}`,`data-act="emp" data-emp="${p.id}"`);});

    <span class="mini">${rows.length} pegawai</span></div>

/* ===== Gantt ===== */
function gantt(tasks){
  const ts=tasks.filter(t=>t.mulai||t.tenggat).slice(0,28);
  if(!ts.length)return '<div class="empty">Tidak ada data tanggal task untuk timeline.</div>';
  let min=Infinity,max=-Infinity;
  ts.forEach(t=>{const a=t.mulai?Date.parse(t.mulai):null,b=(t.selesai||t.tenggat)?Date.parse(t.selesai||t.tenggat):null;
    if(a){min=Math.min(min,a);max=Math.max(max,a);}if(b){min=Math.min(min,b);max=Math.max(max,b);}});
  if(!isFinite(min)||!isFinite(max)||max<=min)max=min+86400000*30;
  const span=max-min;const months=[];let d=new Date(min);d.setDate(1);
  while(d.getTime()<=max){months.push(new Date(d));d.setMonth(d.getMonth()+1);}
  const mlab=['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
  let axis=`<div class="gt-axis" style="grid-template-columns:repeat(${months.length},1fr)">`;
  months.forEach(m=>axis+=`<span>${mlab[m.getMonth()]} ${String(m.getFullYear()).slice(2)}</span>`);axis+=`</div>`;
  let rows='';ts.forEach(t=>{const a=t.mulai?Date.parse(t.mulai):(t.tenggat?Date.parse(t.tenggat):min);
    const b=(t.selesai||t.tenggat)?Date.parse(t.selesai||t.tenggat):a;
    const L=Math.max(0,100*(Math.min(a,b)-min)/span);const Wd=Math.max(2,100*(Math.abs(b-a))/span);
    rows+=`<div class="gt-row"><div class="gl" title="${esc(t.nama)}">${esc(t.nama)}</div><div class="gt-track"><div class="gt-bar" style="left:${L}%;width:${Math.min(100-L,Wd)}%;background:${STC[t.status]||'#cbd5e1'}" title="${esc(t.nama)} (${t.status||'-'})"></div></div></div>`;});
  return `<div class="gantt"><div class="gt-row"><div></div>${axis}</div>${rows}
    <div class="legend"><span><span class="dot" style="background:#16a34a"></span>tepat</span><span><span class="dot" style="background:#e0413a"></span>telat</span><span><span class="dot" style="background:#2f86d8"></span>berjalan</span><span><span class="dot" style="background:#f59e0b"></span>overdue</span><span><span class="dot" style="background:#94a3b8"></span>belum mulai</span></div></div>`;
}

  let h=`<div class="kpis">
    <div class="kpi"><div class="lab">Jenis &amp; Status</div><div class="val" style="font-size:17px">${t.jenis.replace(' Tim','')}</div><div class="note">${statusPill(t.status)}</div></div>
    <div class="kpi gold"><div class="lab">Anggota</div><div class="val">${fmt(t.jml_anggota)}</div><div class="note">${(t.anggota||[]).filter(a=>a.is_leader).length} ketua</div></div>
    <div class="kpi"><div class="lab">Total Task</div><div class="val">${tk?fmt(tk.total):'-'}</div><div class="note">${tk?fmt(tk.selesai_tepat+tk.telat)+' selesai':'belum ada penugasan'}</div></div>
    <div class="kpi ${t.skor!=null&&t.skor<40?'alert':t.skor>=70?'good':''}"><div class="lab">Skor Indikatif</div><div class="val">${t.skor==null?'-':t.skor}</div><div class="note">${t.tepat_pct==null?'':'tepat '+t.tepat_pct+'% &middot; penting '+t.penting_pct+'%'}</div></div></div>
  <div class="card" style="margin-top:6px"><div class="cap"><b>Pemilik kinerja:</b> ${esc(t.owner)||'-'} &middot; <b>Pengelola:</b> ${esc(t.pengelola)||'-'} &middot; <b>UE1:</b> ${esc(t.ue1)} &middot; <b>Periode:</b> ${t.mulai||'?'} &rarr; ${t.selesai||'?'}</div>`;
  if(tk)h+=`<div class="legend"><span><span class="dot" style="background:var(--green)"></span>tepat ${fmt(tk.selesai_tepat)}</span><span><span class="dot" style="background:var(--red)"></span>telat ${fmt(tk.telat)}</span><span><span class="dot" style="background:#2f86d8"></span>berjalan ${fmt(tk.berjalan)}</span><span><span class="dot" style="background:var(--slate)"></span>belum mulai ${fmt(tk.belum_mulai)}</span><span><span class="dot" style="background:var(--amber)"></span>overdue ${fmt(tk.overdue)}</span><span><span class="dot" style="background:#c7d2e8"></span>strategic ${fmt(tk.strategic)} / operational ${fmt(tk.operational)}</span></div>`;
  h+=`</div>`;
  if(t.buckets&&t.buckets.length){h+=`<h2 class="sec">Papan Bucket &middot; ${t.buckets.length} bucket</h2><div class="card">${board(t.buckets)}</div>`;}
  if(t.tasks&&t.tasks.length){h+=`<h2 class="sec">Timeline Penugasan (Gantt) &middot; ${t.tasks.length} task ditampilkan</h2><div class="card" style="overflow-x:auto">${gantt(t.tasks)}</div>`;
    h+=`<h2 class="sec">Daftar Penugasan &middot; ${t.tasks.length} ditampilkan</h2><div class="card" style="overflow-x:auto">${taskTable(t.tasks)}</div>`;}
  h+=`<h2 class="sec">Anggota Tim &amp; Beban Kerja (${(t.anggota||[]).length})</h2><div class="card" style="overflow-x:auto"><table><thead><tr><th>Nama</th><th>Peran</th><th>Unit</th><th class="num-c">Total Tim</th><th class="num-c">Task</th><th class="num-c">Selesai</th><th>Progres</th></tr></thead><tbody>`;
  (t.anggota||[]).slice().sort((a,b)=>{if(a.is_leader!==b.is_leader)return a.is_leader?-1:1;return (a.nama||'').localeCompare(b.nama||'','id');}).forEach(m=>{const p=m.persen!=null?m.persen:(m.jml_task?Math.round(100*(m.task_selesai||0)/m.jml_task):0);
    h+=`<tr><td class="link" data-act="emp" data-emp="${m.id}">${esc(m.nama)}</td><td>${m.is_leader?'<span class="pill on">Ketua</span>':'<span class="pill neu">Anggota</span>'}</td><td class="mini">${esc((m.org||'').split(',')[0])}</td><td class="num-c">${fmt(m.jml_tim)}</td><td class="num-c">${fmt(m.jml_task)}</td><td class="num-c">${fmt(m.task_selesai)}</td><td><div class="track" style="width:110px;display:inline-block;vertical-align:middle"><div class="fill" style="width:${Math.max(2,p)}%"></div></div> <span class="mini">${p}%</span></td></tr>`;});
  return h+`</tbody></table></div>`;
}

/* ===== Employee detail ===== */
function vEmp(){
  const p=DATA.pegawai.find(x=>x.id===state.empId);if(!p)return '<div class="empty">Pegawai tidak ada.</div>';
  let h=`<div class="kpis">
    <div class="kpi gold"><div class="lab">Tim Diikuti</div><div class="val">${fmt(p.jml_tim)}</div><div class="note">${p.is_leader?'pernah jadi ketua':'anggota'}</div></div>
    <div class="kpi"><div class="lab">Total Task</div><div class="val">${fmt(p.jml_task)}</div></div>
    <div class="kpi good"><div class="lab">Task Selesai</div><div class="val">${fmt(p.task_selesai)}</div></div>
    <div class="kpi ${p.persen<50?'alert':''}"><div class="lab">Progres</div><div class="val">${p.persen}%</div></div></div>
  <div class="card" style="margin-top:6px"><div class="cap"><b>NIP:</b> ${esc(p.nip)} &middot; <b>Unit:</b> ${esc(p.org)}</div>
    ${pegSkills(p).length?`<div style="margin-top:8px"><span class="mini" style="font-weight:700">Keahlian (dari riwayat tugas): </span>${pegSkills(p).map(s=>`<span class="pill blue" data-act="skill" data-skill="${esc(s.c)}" style="cursor:pointer;margin:2px 3px 2px 0;display:inline-block">${esc(s.c)} &middot; ${s.n}</span>`).join('')}</div>`:''}</div>
  <h2 class="sec">Performa di Tiap Tim (${p.teams.length})</h2><div class="card" style="overflow-x:auto"><table><thead><tr><th>Tim</th><th>UE1</th><th>Peran</th><th>Status</th><th class="num-c">Task</th><th class="num-c">Selesai</th><th>Progres</th></tr></thead><tbody>`;
  if(!p.teams.length)h+=`<tr><td colspan="7" class="empty">Tidak ada keanggotaan tim tercatat.</td></tr>`;
  p.teams.slice().sort((a,b)=>(b.jml_task||0)-(a.jml_task||0)).forEach(t=>{const pr=t.persen||0;
    h+=`<tr><td class="link" data-act="team" data-team="${t.idx}">${esc(t.nama)}</td><td class="mini">${esc(t.ue1)}</td><td>${t.is_leader?'<span class="pill on">Ketua</span>':'<span class="pill neu">Anggota</span>'}</td><td>${statusPill(t.status)}</td><td class="num-c">${fmt(t.jml_task)}</td><td class="num-c">${fmt(t.task_selesai)}</td><td><div class="track" style="width:110px;display:inline-block;vertical-align:middle"><div class="fill" style="width:${Math.max(2,pr)}%"></div></div> <span class="mini">${pr}%</span></td></tr>`;});
  return h+`</tbody></table></div>`;
}

function renderCrumb(){
  const c=[];const v=state.view;
  const home={ringkasan:'Dashboard Pimpinan',analisis:'Analisis',timanalitik:'Tim Analitik',people:'People Analytics',insight:'Insight & Rekomendasi',heatmap:'Heatmap',beban:'Beban Kerja',struktur:'Struktur',tim:'Tim',pegawai:'Pegawai',keahlian:'Keahlian',avail:'Ketersediaan Pegawai'}[v];
  if(home)c.push(`<span>${home}</span>`);
  else{
    if(['unit1','unit2','team'].includes(v))c.push(`<a data-act="nav" data-view="struktur">Struktur</a>`);
    if(v==='emp')c.push(`<a data-act="nav" data-view="pegawai">Pegawai</a>`);
    if(state.ue1&&['unit1','unit2','team'].includes(v)){c.push('&rsaquo;');c.push(`<a data-act="ue1" data-ue1="${esc(state.ue1)}">${esc(state.ue1)}</a>`);}
    if(state.ue2&&['unit2','team'].includes(v)){c.push('&rsaquo;');c.push(`<a data-act="ue2" data-ue1="${esc(state.ue1)}" data-ue2="${esc(state.ue2)}">${esc(state.ue2)}</a>`);}
    if(v==='team'){c.push('&rsaquo;');c.push(`<span>${esc(DATA.teams[state.teamIdx]?.nama||'Tim')}</span>`);}
    if(v==='unit1'){c.push('&rsaquo;');c.push(`<span>${esc(state.ue1)}</span>`);}
    if(v==='unit2'){c.push('&rsaquo;');c.push(`<span>${esc(state.ue2)}</span>`);}
    if(v==='emp'){c.push('&rsaquo;');c.push(`<span>${esc(DATA.pegawai.find(x=>x.id===state.empId)?.nama||'Pegawai')}</span>`);}
    if(v==='skill'){c.push(`<a data-act="nav" data-view="keahlian">Keahlian</a>`);c.push('&rsaquo;');c.push(`<span>${esc(state.skill)}</span>`);}
  }
  document.getElementById('crumb').innerHTML=c.join(' ');
}
function render(){
  renderNav();document.getElementById('vtitle').textContent=VT[state.view]||'';renderCrumb();
  const map={ringkasan:vRingkasan,analisis:vAnalisis,insight:vInsight,timanalitik:vTimAnalitik,people:vPeople,heatmap:vHeatmap,beban:vBeban,struktur:vStruktur,tim:vTim,pegawai:vPegawai,keahlian:vKeahlian,skill:vSkill,avail:vAvail,unit1:vUnit1,unit2:vUnit2,team:vTeam,emp:vEmp};
  document.getElementById('view').innerHTML=(map[state.view]||(()=>'<div class="empty">-</div>'))();
  window.scrollTo({top:0});bindInputs();
}
function bindInputs(){const q=id=>document.getElementById(id);
  if(q('timQ'))q('timQ').oninput=e=>{state.timQ=e.target.value;rerenderKeep(vTim,'timQ');};
  if(q('timUE1'))q('timUE1').onchange=e=>{state.timUE1=e.target.value;render();};
  if(q('timStat'))q('timStat').onchange=e=>{state.timStat=e.target.value;render();};
  if(q('timAktif'))q('timAktif').onchange=e=>{state.timAktif=e.target.value;render();};
  if(q('pegQ'))q('pegQ').oninput=e=>{state.pegQ=e.target.value;rerenderKeep(vPegawai,'pegQ');};
  if(q('pegUE1'))q('pegUE1').onchange=e=>{state.pegUE1=e.target.value;render();};
  if(q('avQ'))q('avQ').oninput=e=>{state.avQ=e.target.value;rerenderKeep(vAvail,'avQ');};
  if(q('avStat'))q('avStat').onchange=e=>{state.avStat=e.target.value;render();};
  if(q('avUE1'))q('avUE1').onchange=e=>{state.avUE1=e.target.value;render();};
  if(q('skStat'))q('skStat').onchange=e=>{state.skillStat=e.target.value;render();};if(q('insCat'))q('insCat').onchange=e=>{state.insCat=e.target.value;render();};}
function rerenderKeep(fn,fid){const el=document.getElementById(fid);const pos=el?el.selectionStart:null;
  document.getElementById('view').innerHTML=fn();bindInputs();const n=document.getElementById(fid);if(n){n.focus();if(pos!=null)n.setSelectionRange(pos,pos);}}

document.addEventListener('click',e=>{const el=e.target.closest('[data-act]');if(!el)return;const a=el.dataset.act;
  if(a==='nav'){state.view=el.dataset.view;render();if(window.innerWidth<=760){document.getElementById('sidebar').classList.remove('open');document.getElementById('backdrop').classList.remove('show');}}
  else if(a==='ue1'){state.view='unit1';state.ue1=el.dataset.ue1;state.ue2=null;render();}
  else if(a==='ue2'){state.view='unit2';state.ue1=el.dataset.ue1;state.ue2=el.dataset.ue2;render();}
  else if(a==='team'){const t=DATA.teams[+el.dataset.team];state.view='team';state.teamIdx=+el.dataset.team;state.ue1=t.ue1;state.ue2=t.ue2;render();}
  else if(a==='emp'){state.view='emp';state.empId=el.dataset.emp;render();}
  else if(a==='skill'){state.view='skill';state.skill=el.dataset.skill;state.skillStat='';render();}
  else if(a==='exp'){const k=el.dataset.key;state.expanded[k]=!state.expanded[k];render();}
  else if(a==='expandAll'){Object.keys(DATA.ue1).forEach(u=>state.expanded['u:'+u]=true);render();}
  else if(a==='collapseAll'){state.expanded={};render();}
  else if(a==='toggleSide'){if(window.innerWidth<=760){const sb=document.getElementById('sidebar').classList.toggle('open');document.getElementById('backdrop').classList.toggle('show',sb);}else{document.getElementById('sidebar').classList.toggle('collapsed');document.getElementById('main').classList.toggle('wide');}}
  else if(a==='closeNav'){document.getElementById('sidebar').classList.remove('open');document.getElementById('backdrop').classList.remove('show');}
  else if(a==='timsort'){const k=el.dataset.k;state.timSort=state.timSort.k===k?{k,d:-state.timSort.d}:{k,d:1};render();}
  else if(a==='pegsort'){const k=el.dataset.k;state.pegSort=state.pegSort.k===k?{k,d:-state.pegSort.d}:{k,d:1};render();}
  else if(a==='logout'){location.reload();}
});
function setFooters(){
  const s=(DATA&&DATA.summary)||{};const tk=s.task||{};
  document.getElementById('sideFoot').innerHTML=`Data prototipe diolah ${s.tanggal_olah||''}.`;
  document.getElementById('foot').innerHTML=`Keterlambatan dihitung ulang dari tanggal task; ${fmt(tk.anomali||0)} baris anomali (selesai &lt; mulai) dibuang; ${fmt(tk.tak_terukur||0)} task selesai tanpa tenggat ditandai tak terukur. Hierarki UE1/UE2 diturunkan dari jalur organisasi pegawai &amp; pemetaan pemilik kinerja. Skor indikatif = 60% penyelesaian + 40% ketepatan waktu.`;
  const YR=(s.tanggal_olah||'2026').slice(0,4);
  document.getElementById('appfoot').innerHTML=`<span>&copy; ${YR} Powered By <b>Donny Maha Putra</b> &middot; Prototipe</span><span class="r">Dashboard Mekanisme Kerja &middot; Biro Organisasi &amp; Ketatalaksanaan</span>`;
}
const APPS_URL='https://script.google.com/macros/s/AKfycbzwJTs6LLxVJ44kt6AmaPlLc9UV9K_eWQQZOpdrYAtn677QnM7Q2tOdqv58Os7e3I53/exec';async function authenticate(u,p){const url=APPS_URL+'?u='+encodeURIComponent(u)+'&p='+encodeURIComponent(p);const r=await fetch(url);const j=await r.json();if(!j||!j.ok)return null;DATA=j.data;return j.profil;}
async function doLogin(){
  const u=document.getElementById('luser').value.trim().toLowerCase();const p=document.getElementById('lpass').value;
  const errEl=document.getElementById('lerr');errEl.textContent='Memproses...';
  let prof;
  try{prof=await authenticate(u,p);}catch(e){errEl.textContent='Gagal terhubung ke server. Coba lagi.';return;}
  if(!prof){errEl.textContent='Username atau password salah.';return;}
  errEl.textContent='';
  document.getElementById('whoName').textContent=prof.nama;document.getElementById('whoName').title=prof.nama;
  document.getElementById('whoSub').textContent=prof.sub;document.getElementById('whoSub').title=prof.sub;
  document.getElementById('whoPic').textContent=initials(prof.nama);document.getElementById('whoPic2').textContent=initials(prof.nama);
  state.view='ringkasan';state.ue1=null;state.ue2=null;state.expanded={};
  document.getElementById('loginOverlay').style.display='none';
  setFooters();render();
}
document.getElementById('lbtn').onclick=doLogin;
document.getElementById('lpass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
document.getElementById('luser').focus();setFooters();
</script>
