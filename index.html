<style>
:root{
  --brand:#1467c0;--brand-d:#0f5aa8;--brand-l:#e8f1fc;--brand-l2:#d6e7fa;
  --gold:#f0a93f;--gold2:#e8951a;
  --ink:#1f2a37;--muted:#6b7280;--line:#e7ebf1;--bg:#f3f6fb;--side:#ffffff;
  --green:#16a34a;--amber:#f59e0b;--red:#e0413a;--blue:#1467c0;--slate:#7b8794;--vio:#7c3aed;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{font-family:"Segoe UI",system-ui,Arial,sans-serif;color:var(--ink);background:var(--bg);font-size:14px}
.app{display:flex;min-height:100vh}
/* topbar penuh lebar ala Satu Kemenkeu */
.appbar{position:fixed;top:0;left:0;right:0;height:58px;z-index:30;
  background:linear-gradient(100deg,var(--brand-d),var(--brand) 60%,#1d7ad6);
  display:flex;align-items:center;gap:14px;padding:0 18px;color:#fff;box-shadow:0 2px 10px rgba(13,60,120,.18)}
.appbar .burger{cursor:pointer;font-size:20px;opacity:.95;padding:4px 6px;border-radius:6px}
.appbar .burger:hover{background:rgba(255,255,255,.12)}
.appbar .logo{display:flex;align-items:center;height:38px}
.appbar .logo img{height:40px;display:block}
.appbar .modul{font-weight:700;font-size:15px;letter-spacing:.2px;opacity:.97}
.appbar .modul small{font-weight:500;opacity:.8;font-size:11.5px;display:block;line-height:1}
.appbar .right{margin-left:auto;display:flex;align-items:center;gap:14px;font-size:13px;opacity:.95}
.appbar .ava{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.22);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
/* sidebar */
.sidebar{width:248px;flex:none;background:var(--side);border-right:1px solid var(--line);
  position:fixed;top:58px;bottom:0;left:0;overflow-y:auto;transition:width .18s;padding:12px 10px;z-index:20}
.sidebar.collapsed{width:60px}
.who{display:flex;align-items:center;gap:10px;padding:8px 8px 12px;border-bottom:1px solid var(--line);margin-bottom:8px}
.who .pic{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--brand),#1d7ad6);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;flex:none}
.who .t{font-weight:700;font-size:12.5px;line-height:1.15;flex:1;min-width:0;overflow:hidden}
.who .t small{display:block;color:var(--muted);font-weight:500;font-size:10.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sidebar.collapsed .who .t,.sidebar.collapsed .grp-lab,.sidebar.collapsed .nav-i .lab,.sidebar.collapsed .side-foot{display:none}
.grp-lab{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:#9aa1ad;font-weight:700;padding:13px 10px 5px}
.nav-i{display:flex;align-items:center;gap:11px;padding:8px 10px;border-radius:8px;cursor:pointer;color:#3b4252;font-weight:600;margin:1px 0;white-space:nowrap;font-size:13.5px;border-left:3px solid transparent}
.nav-i:hover{background:#f1f5fb}
.nav-i.active{background:var(--brand-l);color:var(--brand);border-left-color:var(--brand)}
.nav-i .ic{width:18px;text-align:center;flex:none}
.side-foot{font-size:10px;color:#aab0bb;padding:12px 10px;line-height:1.5;border-top:1px solid var(--line);margin-top:10px}
.collapse-btn{cursor:pointer;color:var(--muted);font-size:16px;background:#f3f6fb;border:1px solid var(--line);border-radius:8px;padding:6px 9px;margin:8px;display:inline-block}
/* main */
.main{flex:1;min-width:0;margin-left:248px;margin-top:58px;display:flex;flex-direction:column;transition:margin .18s;min-height:calc(100vh - 58px)}
.main.wide{margin-left:60px}
.subbar{background:#fff;border-bottom:1px solid var(--line);padding:11px 26px;display:flex;align-items:center;gap:14px;position:sticky;top:58px;z-index:8}
.subbar h1{font-size:16px;margin:0;color:var(--brand-d);font-weight:800}
.crumb{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--muted);flex-wrap:wrap}
.crumb a{color:var(--brand);cursor:pointer;font-weight:600}.crumb a:hover{text-decoration:underline}
.content{padding:20px 26px 70px;max-width:1280px;width:100%}
/* bits */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(176px,1fr));gap:14px;margin-bottom:6px}
.kpi{background:#fff;border:1px solid var(--line);border-radius:10px;padding:16px 14px;display:flex;flex-direction:column;justify-content:center;text-align:center;min-height:106px}
.kpi .lab{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.2px}
.kpi .val{font-size:27px;font-weight:800;color:var(--brand-d);margin-top:6px;line-height:1.05}
.kpi .note{font-size:11px;color:var(--muted);margin-top:6px}
.kpi.alert .val{color:var(--red)}.kpi.good .val{color:var(--green)}.kpi.gold .val{color:var(--gold2)}
h2.sec{font-size:14px;margin:24px 0 12px;color:var(--brand-d);font-weight:800;border-left:4px solid var(--gold);padding-left:10px}
.grid2{display:grid;grid-template-columns:1.45fr 1fr;gap:16px;align-items:stretch}
.grid2.eq{grid-template-columns:1fr 1fr}
.grid2>.card{height:100%}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;align-items:stretch}
.grid3>.card{height:100%}
@media(max-width:900px){.grid2,.grid2.eq{grid-template-columns:1fr}.grid3{grid-template-columns:1fr}}
.card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px;box-shadow:0 1px 2px rgba(20,60,120,.04)}
.card h3{margin:0 0 3px;font-size:13.5px;color:var(--brand-d)}
.card .cap{font-size:11.5px;color:var(--muted);margin-bottom:13px}
.bar-row{display:grid;grid-template-columns:200px 1fr 96px;align-items:center;gap:10px;margin:8px 0;font-size:12.5px}
@media(max-width:560px){.bar-row{grid-template-columns:120px 1fr 72px}}
.bar-row .name{font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-row .name.clk{cursor:pointer}.bar-row .name.clk:hover{color:var(--brand);text-decoration:underline}
.track{background:#eef1f6;border-radius:6px;height:17px;overflow:hidden}
.fill{height:100%;border-radius:6px;background:var(--brand)}
.fill.late{background:var(--red)}.fill.green{background:var(--green)}.fill.gold{background:linear-gradient(90deg,var(--gold2),var(--gold))}
.bar-row .num{text-align:right;font-variant-numeric:tabular-nums;color:var(--muted);font-size:11.5px}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th,td{text-align:left;padding:9px 10px;border-bottom:1px solid var(--line)}
th{background:#f4f8fd;color:var(--brand-d);font-size:10.5px;text-transform:uppercase;letter-spacing:.3px;position:sticky;top:0}
th.srt{cursor:pointer}th.srt:hover{color:var(--brand)}
tbody tr:hover{background:#f7fbff}
td.link{color:var(--brand);cursor:pointer;font-weight:600}td.link:hover{text-decoration:underline}
.num-c{text-align:center;font-variant-numeric:tabular-nums}
.pill{font-size:10.5px;padding:2px 8px;border-radius:20px;font-weight:700;white-space:nowrap}
.pill.on{background:#dcfce7;color:#166534}.pill.off{background:#fde2e1;color:#9b1c17}.pill.warn{background:#fef3c7;color:#92400e}
.pill.neu{background:#eceef2;color:#374151}.pill.blue{background:#dbe9fb;color:#114a8f}.pill.vio{background:#ede9fe;color:#5b21b6}
.mini{font-size:11px;color:var(--muted)}
.note-box{background:#eef5fe;border:1px solid var(--brand-l2);border-radius:10px;padding:11px 15px;font-size:12px;color:#0f4c92;margin:12px 0}
.toolbar{display:flex;gap:9px;align-items:center;margin-bottom:11px;flex-wrap:wrap}
input.search,select.flt{border:1px solid var(--line);border-radius:8px;padding:7px 11px;font-size:12.5px;background:#fff;color:var(--ink)}
input.search{width:230px}
.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:11.5px;color:var(--muted);margin-top:8px}
.dot{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:5px;vertical-align:-1px}
.hm{border-collapse:separate;border-spacing:3px}
.hm td,.hm th{border:none;padding:0}
.hm .rh{font-weight:600;font-size:12px;padding-right:10px;white-space:nowrap;cursor:pointer;max-width:230px;overflow:hidden;text-overflow:ellipsis}
.hm .rh:hover{color:var(--brand)}
.hm .ch{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;text-align:center;padding-bottom:6px}
.hm .cell{width:92px;height:40px;border-radius:7px;text-align:center;vertical-align:middle;font-weight:700;font-size:12.5px;color:#1f2937}
.tree{font-size:13px}
.trow{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:8px;cursor:pointer}
.trow:hover{background:#eef5fe}
.tw{width:16px;text-align:center;color:var(--muted);flex:none;font-size:11px}
.tname{font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tmet{display:flex;gap:6px;align-items:center;flex:none}
.tag{font-size:10.5px;padding:2px 7px;border-radius:6px;background:#eef1f6;color:#475569;font-weight:700}
.tchild{margin-left:18px;border-left:2px solid var(--line);padding-left:6px}
.lvl-ue1 .tname{color:var(--brand-d);font-weight:800}.lvl-team .tname{font-weight:500}
.donut{display:flex;gap:18px;align-items:center;flex-wrap:wrap}
svg{display:block}
.skor{display:inline-flex;align-items:center;gap:6px}
.skor .sb{width:64px;height:9px;border-radius:5px;background:#eef1f6;overflow:hidden;display:inline-block}
.skor .sf{height:100%;border-radius:5px}
/* gantt */
.gantt{font-size:11.5px}
.gt-row{display:grid;grid-template-columns:220px 1fr;align-items:center;gap:8px;margin:3px 0}
@media(max-width:640px){.gt-row{grid-template-columns:120px 1fr}}
.gt-row .gl{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600}
.gt-track{position:relative;height:18px;background:#f4f6fa;border-radius:5px;border:1px solid #eef1f6}
.gt-bar{position:absolute;height:12px;top:2px;border-radius:4px;min-width:3px}
.gt-axis{display:grid;gap:0;margin:2px 0 6px;color:var(--muted);font-size:10px;border-bottom:1px solid var(--line)}
.gt-axis span{text-align:left;padding-bottom:3px;border-left:1px solid #eef1f6;padding-left:3px}
.foot{font-size:11px;color:var(--muted);margin-top:26px;line-height:1.6}
.appfoot{position:fixed;left:0;right:0;bottom:0;z-index:30;background:#fff;border-top:1px solid var(--line);padding:9px 22px;display:flex;justify-content:space-between;align-items:center;font-size:11.5px;color:var(--muted);gap:8px;box-shadow:0 -2px 8px rgba(13,60,120,.06)}
.appfoot b{color:var(--brand-d)}.appfoot .r{color:#9aa1ad}
@media(max-width:640px){.appfoot .r{display:none}}
.gap-row{display:flex;justify-content:space-between;font-size:12.5px;padding:6px 0;border-bottom:1px dashed var(--line)}
.empty{color:var(--muted);font-size:12.5px;padding:20px;text-align:center}
/* login */
.login-wrap{position:fixed;inset:0;z-index:100;background:linear-gradient(120deg,var(--brand-d),var(--brand) 55%,#1d7ad6);display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{background:#fff;border-radius:16px;padding:34px 30px;width:360px;max-width:92vw;box-shadow:0 18px 60px rgba(8,40,90,.35);text-align:center}
.login-card img{height:46px;margin-bottom:14px}
.login-card h2{margin:0 0 2px;font-size:18px;color:var(--brand-d)}
.login-card p{margin:0 0 20px;font-size:12.5px;color:var(--muted)}
.login-card input{width:100%;border:1px solid var(--line);border-radius:9px;padding:11px 13px;font-size:14px;margin-bottom:11px;color:var(--ink)}
.login-card input:focus{outline:none;border-color:var(--brand)}
.login-card button{width:100%;background:var(--brand);color:#fff;border:none;border-radius:9px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;margin-top:4px}
.login-card button:hover{background:var(--brand-d)}
.lerr{color:var(--red);font-size:12px;min-height:16px;margin-bottom:6px}
.login-foot{font-size:10.5px;color:#9aa1ad;margin-top:16px;line-height:1.5}
.appbar .out{cursor:pointer;font-size:12px;opacity:.92;padding:5px 10px;border:1px solid rgba(255,255,255,.35);border-radius:7px}
.appbar .out:hover{background:rgba(255,255,255,.14)}
</style>
</head>

<script>
const FULL = {"summary":{"tanggal_olah":"","task":{"anomali":0,"tak_terukur":0}},"teams":[],"pegawai":[],"ue1":{},"ue2":{},"trend":[],"trend_ue1":{},"trend_ue2":{},"skills_catalog":[]};
let DATA = FULL;
const ACCOUNTS = [];
function scopeData(sc){
  if(sc.type==='all') return FULL;
  const inT = t => sc.type==='ue1' ? t.ue1===sc.ue1 : (t.ue1===sc.ue1 && t.ue2===sc.ue2);
  const inMem = tt => sc.type==='ue1' ? tt.ue1===sc.ue1 : (tt.ue1===sc.ue1 && tt.ue2===sc.ue2);
  const teams = FULL.teams.filter(inT);
  const pegawai = FULL.pegawai.filter(p => (p.teams||[]).some(inMem));
  const blank = () => ({jml_tim:0,tim_aktif:0,regular:0,squad:0,anggota:0,task_total:0,telat:0,tepat:0,overdue:0,belum:0,status:{},peg:new Set()});
  const u1={},u2={};
  function add(map,key,t){if(!map[key])map[key]=blank();const a=map[key];a.jml_tim++;a.anggota+=(t.jml_anggota||0);a[t.jenis==='Squad Tim'?'squad':'regular']++;a.status[t.status]=(a.status[t.status]||0)+1;if(t.punya_task){a.tim_aktif++;const k=t.task;a.task_total+=k.total;a.telat+=k.telat;a.tepat+=k.selesai_tepat;a.overdue+=k.overdue;a.belum+=k.belum_selesai;}(t.anggota||[]).forEach(m=>a.peg.add(m.id));}
  teams.forEach(t=>{add(u1,t.ue1,t);add(u2,t.ue1+'||'+t.ue2,t);});
  const ser=a=>{const done=a.telat+a.tepat;return {jml_tim:a.jml_tim,tim_aktif:a.tim_aktif,adopsi_pct:a.jml_tim?Math.round(1000*a.tim_aktif/a.jml_tim)/10:0,regular:a.regular,squad:a.squad,anggota:a.anggota,pegawai_unik:a.peg.size,task_total:a.task_total,telat:a.telat,tepat:a.tepat,overdue:a.overdue,belum:a.belum,telat_pct:done?Math.round(1000*a.telat/done)/10:null,status:a.status};};
  const ue1={};Object.keys(u1).forEach(k=>ue1[k]=ser(u1[k]));
  const ue2={};Object.keys(u2).forEach(k=>ue2[k]=ser(u2[k]));
  const tk={total:0,selesai_tepat:0,telat:0,berjalan:0,belum_mulai:0,belum_selesai:0,overdue:0,tak_terukur:0,anomali:0,strategic:0,operational:0};
  const statusTim={};let reg=0,sq=0,aktif=0;
  teams.forEach(t=>{statusTim[t.status]=(statusTim[t.status]||0)+1;if(t.jenis==='Squad Tim')sq++;else reg++;if(t.punya_task){aktif++;const x=t.task;['total','selesai_tepat','telat','berjalan','belum_mulai','belum_selesai','overdue','tak_terukur','strategic','operational','anomali'].forEach(f=>tk[f]+=(x[f]||0));}});
  const done=tk.telat+tk.selesai_tepat;
  const sized={};teams.forEach(t=>{const nn=t.jml_anggota||0;const b=nn<=3?'1-3':nn<=6?'4-6':nn<=10?'7-10':nn<=20?'11-20':'21+';sized[b]=(sized[b]||0)+1;});
  const workd={};pegawai.forEach(p=>{const n=(p.teams||[]).filter(inMem).length;const k=n>=4?'4+':String(n);workd[k]=(workd[k]||0)+1;});
  const summary=Object.assign({},FULL.summary,{total_tim:teams.length,tim_aktif:aktif,adopsi_pct:teams.length?Math.round(1000*aktif/teams.length)/10:0,total_pegawai:pegawai.length,pegawai_dalam_tim:pegawai.length,regular:reg,squad:sq,status_tim:statusTim,task:tk,telat_pct:done?Math.round(1000*tk.telat/done)/10:0,karakteristik:{Strategic:tk.strategic,Operational:tk.operational},size_dist:sized,work_dist:workd,n_ue1:Object.keys(ue1).length});
  const trend = sc.type==='ue1' ? ((FULL.trend_ue1||{})[sc.ue1]||[]) : ((FULL.trend_ue2||{})[sc.ue1+'||'+sc.ue2]||[]);
  return {summary,ue1,ue2,teams,pegawai,trend,trend_ue1:FULL.trend_ue1,trend_ue2:FULL.trend_ue2,skills_catalog:FULL.skills_catalog};
}
function initials(s){const w=String(s||'').trim().split(/\s+/);return ((w[0]||'')[0]||'').toUpperCase()+((w[1]||'')[0]||'').toUpperCase()||'MK';}
const fmt=n=>(n==null?'-':n.toLocaleString('id-ID'));
const pct=n=>(n==null?'-':n+'%');
const esc=s=>(s==null?'':String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'));
const colorAdopt=p=>p>=40?'var(--green)':p>=10?'var(--amber)':'var(--red)';
const skorColor=s=>s==null?'#cbd5e1':s>=70?'var(--green)':s>=40?'var(--amber)':'var(--red)';
const statusPill=s=>{const m={'Pelaksanaan':'on','Penetapan':'blue','Rekrutmen':'warn','Seleksi':'neu'};return `<span class="pill ${m[s]||'neu'}">${esc(s)}</span>`;};
const STC={tepat:'#16a34a',telat:'#e0413a',berjalan:'#2f86d8',belum:'#94a3b8',overdue:'#f59e0b',tak_terukur:'#64748b','':'#cbd5e1'};
function prioPill(p){const m={Urgent:'off',Important:'warn',Medium:'neu',Low:'neu'};return `<span class="pill ${m[p]||'neu'}">${esc(p||'-')}</span>`;}
function taskPill(s){const m={tepat:['on','Tepat'],telat:['off','Telat'],berjalan:['blue','Berjalan'],belum:['neu','Belum mulai'],overdue:['warn','Overdue'],tak_terukur:['on','Selesai']};const x=m[s]||['neu',s||'-'];return `<span class="pill ${x[0]}">${x[1]}</span>`;}
function board(buckets){if(!buckets||!buckets.length)return '';
  let h='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px">';
  buckets.forEach(b=>{const tot=b.total||1;const ontime=Math.max(0,b.selesai-b.telat);
    const seg=[['#16a34a',ontime],['#e0413a',b.telat],['#2f86d8',b.berjalan],['#f59e0b',b.overdue],['#94a3b8',b.belum]];
    let bs='';seg.forEach(([c,v])=>{if(v>0)bs+=`<span style="width:${100*v/tot}%;background:${c}"></span>`;});
    h+=`<div style="border:1px solid var(--line);border-radius:10px;padding:11px 12px;background:#fcfdff">
      <div style="font-weight:700;font-size:12.5px;color:var(--brand-d);overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(b.nama)}">${esc(b.nama)}</div>
      <div class="mini" style="margin:3px 0 7px">${b.total} task</div>
      <div style="display:flex;height:9px;border-radius:5px;overflow:hidden;background:#eef1f6">${bs}</div>
      <div class="mini" style="margin-top:7px;display:flex;flex-wrap:wrap;gap:9px">
        <span style="color:#16a34a">&#9679;${b.selesai} selesai</span>${b.berjalan?`<span style="color:#2f86d8">&#9679;${b.berjalan} jalan</span>`:''}${b.overdue?`<span style="color:#f59e0b">&#9679;${b.overdue} overdue</span>`:''}${b.belum?`<span style="color:#94a3b8">&#9679;${b.belum} belum</span>`:''}</div></div>`;});
  return h+'</div>';}
function taskTable(tasks){if(!tasks||!tasks.length)return '<div class="empty">Tidak ada data task.</div>';
  const ord={overdue:0,telat:1,berjalan:2,belum:3,tak_terukur:4,tepat:5};
  const ts=tasks.slice().sort((a,b)=>(a.bucket||'').localeCompare(b.bucket||'','id')||((ord[a.status]??9)-(ord[b.status]??9)));
  let h='<table><thead><tr><th>Task</th><th>Bucket</th><th>PIC</th><th>Prioritas</th><th>Status</th><th>Tenggat</th></tr></thead><tbody>';
  ts.forEach(t=>h+=`<tr><td>${esc(t.nama)}</td><td class="mini">${esc(t.bucket)}</td><td class="mini">${esc(t.pic)}</td><td>${prioPill(t.prio)}</td><td>${taskPill(t.status)}</td><td class="mini">${t.tenggat||'-'}</td></tr>`);
  return h+'</tbody></table>';}
function skorCell(s){if(s==null)return '<span class="mini">-</span>';return `<span class="skor"><span class="sb"><span class="sf" style="width:${Math.max(3,s)}%;background:${skorColor(s)}"></span></span>${s}</span>`;}

const NAV=[
 {grp:'Eksekutif',items:[{v:'ringkasan',ic:'📊',lab:'Dashboard Pimpinan'},{v:'analisis',ic:'📈',lab:'Analisis Kinerja'}]},
 {grp:'Analitik',items:[{v:'timanalitik',ic:'🏆',lab:'Tim Analitik'},{v:'people',ic:'🧑‍💼',lab:'People Analytics'},{v:'heatmap',ic:'🔥',lab:'Heatmap Adopsi'},{v:'beban',ic:'⚖️',lab:'Beban Kerja'}]},
 {grp:'Jelajah',items:[{v:'struktur',ic:'🌳',lab:'Struktur Unit'},{v:'tim',ic:'👥',lab:'Penjelajah Tim'},{v:'pegawai',ic:'🧑',lab:'Penjelajah Pegawai'},{v:'keahlian',ic:'🧠',lab:'Keahlian (Expert Locator)'},{v:'avail',ic:'🟢',lab:'Ketersediaan Pegawai'}]},
];
let state={view:'ringkasan',ue1:null,ue2:null,teamIdx:null,empId:null,expanded:{},
  timSort:{k:'skor',d:-1},pegSort:{k:'jml_tim',d:-1},timQ:'',timUE1:'',timStat:'',timAktif:'',pegQ:'',pegUE1:'',avQ:'',avUE1:'',avStat:'',skill:null,skillStat:''};

function renderNav(){let h='';NAV.forEach(g=>{h+=`<div class="grp-lab">${g.grp}</div>`;

  struktur:'Struktur Unit',tim:'Penjelajah Tim',pegawai:'Penjelajah Pegawai',keahlian:'Keahlian (Expert Locator)',skill:'Pegawai per Keahlian',avail:'Ketersediaan Pegawai',unit1:'Unit Eselon I',unit2:'Unit Eselon II',team:'Detail Tim',emp:'Detail Pegawai'};

function bar(name,val,max,cls,num,act){const w=max?Math.max(2,Math.round(100*val/max)):0;
  const a=act?`data-act="${act.a}" ${act.d||''}`:'';
  return `<div class="bar-row"><div class="name ${act?'clk':''}" ${a} title="${esc(name)}">${esc(name)}</div><div class="track"><div class="fill ${cls||''}" style="width:${w}%"></div></div><div class="num">${num}</div></div>`;}
function donut(parts,size){const tot=parts.reduce((s,p)=>s+p.v,0)||1;const r=size/2-6,cx=size/2,cy=size/2;let a=-Math.PI/2,segs='';
  parts.forEach(p=>{const ang=2*Math.PI*p.v/tot;const x1=cx+r*Math.cos(a),y1=cy+r*Math.sin(a);a+=ang;const x2=cx+r*Math.cos(a),y2=cy+r*Math.sin(a);const lg=ang>Math.PI?1:0;
    segs+=`<path d="M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${lg} 1 ${x2},${y2} Z" fill="${p.c}"/>`;});
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${segs}<circle cx="${cx}" cy="${cy}" r="${r*0.58}" fill="#fff"/></svg>`;}

/* ===== Analisis ===== */
function vAnalisis(){
  const s=DATA.summary;const tr=DATA.trend;const mx=Math.max(...tr.flatMap(t=>[t.tepat,t.telat]),1);
  const W=720,H=210,padL=36,padR=14,padT=14,padB=30;const nT=tr.length;
  const X=i=>padL+(W-padL-padR)*(nT<=1?0:i/(nT-1));const Y=v=>H-padB-(v/mx)*(H-padT-padB);
  const MO=['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
  const line=(k,c)=>`<polyline points="${tr.map((t,i)=>X(i).toFixed(1)+','+Y(t[k]).toFixed(1)).join(' ')}" fill="none" stroke="${c}" stroke-width="2.4"/>`+tr.map((t,i)=>`<circle cx="${X(i).toFixed(1)}" cy="${Y(t[k]).toFixed(1)}" r="2.8" fill="${c}"/>`).join('');
  const lines=line('tepat','#16a34a')+line('telat','#e0413a');
  let xlabels='';tr.forEach((t,i)=>{const mm=t.bulan.slice(5),yy=t.bulan.slice(2,4);let lab=MO[(parseInt(mm)||1)-1];if(mm==='01'||i===0)lab+=" '"+yy;xlabels+=`<text x="${X(i).toFixed(1)}" y="${H-9}" font-size="9.5" fill="#6b7280" text-anchor="middle">${lab}</text>`;});
  let grid='';for(let g=0;g<=2;g++){const gy=padT+(H-padT-padB)*g/2;grid+=`<line x1="${padL}" y1="${gy.toFixed(1)}" x2="${W-padR}" y2="${gy.toFixed(1)}" stroke="#f0f2f6"/>`;}
  let h=`<div class="kpis">
    <div class="kpi"><div class="lab">Total Task</div><div class="val">${fmt(s.task.total)}</div><div class="note">${fmt(s.task.anomali)} anomali dibuang</div></div>
    <div class="kpi good"><div class="lab">Selesai Tepat</div><div class="val">${fmt(s.task.selesai_tepat)}</div></div>
    <div class="kpi alert"><div class="lab">Selesai Telat</div><div class="val">${fmt(s.task.telat)}</div></div>
    <div class="kpi alert"><div class="lab">Overdue</div><div class="val">${fmt(s.task.overdue)}</div><div class="note">lewat tenggat</div></div></div>
  <h2 class="sec">Tren penyelesaian task per bulan</h2><div class="card">${tr.length?`<div class="cap">Hijau = selesai tepat, merah = selesai telat (menurut bulan penyelesaian).</div>
    <svg width="100%" viewBox="0 0 ${W} ${H}">${grid}<line x1="${padL}" y1="${H-padB}" x2="${W-padR}" y2="${H-padB}" stroke="#e5e7eb"/>${lines}${xlabels}</svg>
    <div class="legend"><span><span class="dot" style="background:#16a34a"></span>tepat</span><span><span class="dot" style="background:#e0413a"></span>telat</span></div>`:`<div class="empty">Belum ada aktivitas penyelesaian task untuk lingkup ini.</div>`}</div>
  <div class="grid2 eq"><div class="card"><h3>Distribusi prioritas task</h3><div class="cap">Seluruh task.</div>`;
  const pr=s.prioritas,pm=Math.max(...Object.values(pr));['Urgent','Important','Medium','Low'].forEach(k=>{if(pr[k])h+=bar(k,pr[k],pm,k==='Urgent'?'late':k==='Important'?'gold':'',fmt(pr[k]));});
  h+=`</div><div class="card"><h3>Karakteristik &amp; ukuran tim</h3><div class="cap">Strategic vs operational; sebaran ukuran tim.</div>`;
  const kk=s.karakteristik,km=Math.max(...Object.values(kk));Object.entries(kk).forEach(([k,v])=>h+=bar(k,v,km,k==='Strategic'?'gold':'',fmt(v)));
  h+=`<div style="margin-top:10px"></div>`;const sd=s.size_dist,sm=Math.max(...Object.values(sd));['1-3','4-6','7-10','11-20','21+'].forEach(k=>{if(sd[k])h+=bar(k+' anggota',sd[k],sm,'',fmt(sd[k])+' tim');});
  h+=`</div></div><h2 class="sec">Keterlambatan per Unit Eselon I (aktif)</h2><div class="card">`;
  const ue1=Object.entries(DATA.ue1).map(([k,v])=>({k,...v})).filter(u=>u.telat_pct!=null).sort((a,b)=>b.telat_pct-a.telat_pct);
  ue1.forEach(u=>h+=bar(u.k,u.telat_pct,100,'late',u.telat_pct+'% ('+fmt(u.task_total)+' task)',{a:'ue1',d:`data-ue1="${esc(u.k)}"`}));
  if(!ue1.length)h+=`<div class="empty">Belum ada unit dengan task.</div>`;
  return h+`</div>`;
}

/* ===== Heatmap ===== */
function vHeatmap(){
  const ue1=Object.entries(DATA.ue1).map(([k,v])=>({k,...v})).sort((a,b)=>b.jml_tim-a.jml_tim);
  const cols=[{k:'jml_tim',lab:'Jml Tim',dir:0},{k:'adopsi_pct',lab:'% Adopsi',dir:1},{k:'pegawai_unik',lab:'Pegawai',dir:0},{k:'task_total',lab:'Task',dir:0},{k:'telat_pct',lab:'% Telat',dir:-1},{k:'overdue',lab:'Overdue',dir:-1}];
  const rng={};cols.forEach(c=>{const v=ue1.map(u=>u[c.k]).filter(x=>x!=null);rng[c.k]=[Math.min(...v),Math.max(...v)];});
  function cc(c,v){if(v==null)return '#f1f3f7';const[mn,mx]=rng[c.k];const t=mx>mn?(v-mn)/(mx-mn):0.5;
    if(c.dir===1)return `rgb(${Math.round(222-130*t)},${Math.round(238-20*t)},${Math.round(220-150*t)})`;
    if(c.dir===-1)return `rgb(${Math.round(224+24*t)},${Math.round(232-150*t)},${Math.round(222-150*t)})`;
    return `rgb(${Math.round(228-120*t)},${Math.round(238-90*t)},${Math.round(250-12*t)})`;}
  let h=`<div class="cap" style="margin-bottom:12px">Matriks UE1 (baris) &times; metrik (kolom). Hijau makin tinggi = adopsi baik; merah makin tinggi = keterlambatan/overdue tinggi; biru = volume. Klik baris untuk menelusuri.</div>
  <div class="card" style="overflow-x:auto"><table class="hm"><tr><th class="ch" style="text-align:left">Unit Eselon I</th>`;
  cols.forEach(c=>h+=`<th class="ch">${c.lab}</th>`);h+=`</tr>`;
  ue1.forEach(u=>{h+=`<tr><td class="rh" data-act="ue1" data-ue1="${esc(u.k)}" title="${esc(u.k)}">${esc(u.k)}</td>`;
    cols.forEach(c=>{const v=u[c.k];h+=`<td class="cell" style="background:${cc(c,v)}">${v==null?'-':(c.k.endsWith('pct')?v+'%':fmt(v))}</td>`;});h+=`</tr>`;});
  return h+`</table></div>`;
}

/* ===== helper ranking & kuadran ===== */
function medal(i){return ['🥇','🥈','🥉'][i]||`<b style="color:var(--muted)">${i+1}</b>`;}
function rankRow(i,name,right,metric,color,sub,act){
  return `<div style="display:flex;align-items:center;gap:10px;padding:7px 2px;border-bottom:1px solid var(--line);${act?'cursor:pointer':''}" ${act||''}>
    <div style="width:22px;text-align:center;font-size:14px">${medal(i)}</div>
    <div style="flex:1;min-width:0">
      <div style="display:flex;justify-content:space-between;gap:8px"><span style="font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;${act?'color:var(--brand)':''}">${name}</span><span class="mini" style="white-space:nowrap">${right}</span></div>
      <div class="track" style="height:7px;margin-top:4px"><div class="fill" style="width:${Math.max(3,metric)}%;background:${color}"></div></div>
      ${sub?`<div class="mini" style="margin-top:2px">${sub}</div>`:''}</div></div>`;}
function quadrant(points,xlab,ylab,ql){
  const W=560,H=360,p=44,pw=W-p*2,ph=H-p*2;
  const sx=x=>p+pw*Math.max(0,Math.min(100,x))/100, sy=y=>p+ph*(1-Math.max(0,Math.min(100,y))/100);
  const bg=`<rect x="${p}" y="${p}" width="${pw/2}" height="${ph/2}" fill="rgba(37,99,235,.05)"/><rect x="${p+pw/2}" y="${p}" width="${pw/2}" height="${ph/2}" fill="rgba(22,163,74,.07)"/><rect x="${p}" y="${p+ph/2}" width="${pw/2}" height="${ph/2}" fill="rgba(224,65,58,.05)"/><rect x="${p+pw/2}" y="${p+ph/2}" width="${pw/2}" height="${ph/2}" fill="rgba(245,158,11,.06)"/>`;
  const mid=`<line x1="${p}" y1="${(p+ph/2).toFixed(1)}" x2="${W-p}" y2="${(p+ph/2).toFixed(1)}" stroke="#e5e7eb" stroke-dasharray="4 4"/><line x1="${(p+pw/2).toFixed(1)}" y1="${p}" x2="${(p+pw/2).toFixed(1)}" y2="${H-p}" stroke="#e5e7eb" stroke-dasharray="4 4"/><line x1="${p}" y1="${p}" x2="${p}" y2="${H-p}" stroke="#cbd5e1"/><line x1="${p}" y1="${H-p}" x2="${W-p}" y2="${H-p}" stroke="#cbd5e1"/>`;
  const lbl=`<text x="${W-p-6}" y="${p+15}" text-anchor="end" font-size="11" font-weight="700" fill="#16a34a">${ql[0]}</text><text x="${p+6}" y="${p+15}" font-size="11" font-weight="700" fill="#2563eb">${ql[1]}</text><text x="${W-p-6}" y="${H-p-8}" text-anchor="end" font-size="11" font-weight="700" fill="#e0951a">${ql[2]}</text><text x="${p+6}" y="${H-p-8}" font-size="11" font-weight="700" fill="#e0413a">${ql[3]}</text>`;
  const dots=points.map(pt=>`<circle cx="${sx(pt.x).toFixed(1)}" cy="${sy(pt.y).toFixed(1)}" r="${pt.r.toFixed(1)}" fill="${pt.color}" stroke="#fff" stroke-width="1"><title>${esc(pt.label)}</title></circle>`).join('');
  const al=`<text x="${W/2}" y="${H-6}" text-anchor="middle" font-size="11" fill="#6b7280">${xlab}</text><text x="13" y="${H/2}" text-anchor="middle" font-size="11" fill="#6b7280" transform="rotate(-90 13 ${H/2})">${ylab}</text>`;
  return `<svg width="100%" viewBox="0 0 ${W} ${H}">${bg}${mid}${lbl}${dots}${al}</svg>`;}
function histBars(counts,labels){const m=Math.max(...counts,1);let h='';counts.forEach((c,i)=>h+=bar(labels[i],c,m,'',fmt(c)+' tim'));return h;}

/* ===== Tim Analitik ===== */

  const top=active.slice().sort((a,b)=>b.t.skor-a.t.skor||b.t.task.total-a.t.task.total).slice(0,10);

  const pts=active.map(o=>{const t=o.t,tk=t.task;const comp=Math.round(100*(tk.selesai_tepat+tk.telat)/Math.max(1,tk.total));const tp=t.tepat_pct||0;

  let h=`<div class="kpis">

    <div class="kpi alert"><div class="lab">Perlu Perhatian</div><div class="val">${lo}</div><div class="note">skor &lt; 40</div></div></div>

    <div class="card"><h3>🏆 Top 10 Tim Terbaik</h3><div class="cap">Berdasarkan skor (penyelesaian + ketepatan). Klik untuk detail.</div>`;
  top.forEach((o,i)=>{const t=o.t;h+=rankRow(i,esc(t.nama),`skor ${t.skor}`,t.skor,skorColor(t.skor),`${t.task.total} task &middot; tepat ${t.tepat_pct}% &middot; ${esc(t.ue1)}`,`data-act="team" data-team="${o.i}"`);});
  h+=`</div></div>
  <div class="grid2"><div class="card"><h3>⚠️ 10 Tim Perlu Perhatian</h3><div class="cap">Skor terendah di antara tim aktif. Klik untuk detail.</div>`;

function availStatus(p){const pf=p.perf;const open=pf?(pf.total-pf.selesai):0;const over=pf?pf.overdue:0;const jt=p.jml_tim;
  if(over>0||jt>=3||open>=15)return 'sibuk';if(open===0&&jt<=1)return 'tersedia';return 'terbatas';}
function availPill(s){const m={tersedia:['on','Tersedia'],terbatas:['warn','Terbatas'],sibuk:['off','Sibuk']};const x=m[s];return `<span class="pill ${x[0]}">${x[1]}</span>`;}

/* ===== Gantt ===== */
function gantt(tasks){
  const ts=tasks.filter(t=>t.mulai||t.tenggat).slice(0,28);
  if(!ts.length)return '<div class="empty">Tidak ada data tanggal task untuk timeline.</div>';
  let min=Infinity,max=-Infinity;
  ts.forEach(t=>{const a=t.mulai?Date.parse(t.mulai):null,b=(t.selesai||t.tenggat)?Date.parse(t.selesai||t.tenggat):null;
    if(a){min=Math.min(min,a);max=Math.max(max,a);}if(b){min=Math.min(min,b);max=Math.max(max,b);}});
  if(!isFinite(min)||!isFinite(max)||max<=min)max=min+86400000*30;
  const span=max-min;const months=[];let d=new Date(min);d.setDate(1);
  while(d.getTime()<=max){months.push(new Date(d));d.setMonth(d.getMonth()+1);}
  const mlab=['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
  let axis=`<div class="gt-axis" style="grid-template-columns:repeat(${months.length},1fr)">`;
  months.forEach(m=>axis+=`<span>${mlab[m.getMonth()]} ${String(m.getFullYear()).slice(2)}</span>`);axis+=`</div>`;
  let rows='';ts.forEach(t=>{const a=t.mulai?Date.parse(t.mulai):(t.tenggat?Date.parse(t.tenggat):min);
    const b=(t.selesai||t.tenggat)?Date.parse(t.selesai||t.tenggat):a;
    const L=Math.max(0,100*(Math.min(a,b)-min)/span);const Wd=Math.max(2,100*(Math.abs(b-a))/span);
    rows+=`<div class="gt-row"><div class="gl" title="${esc(t.nama)}">${esc(t.nama)}</div><div class="gt-track"><div class="gt-bar" style="left:${L}%;width:${Math.min(100-L,Wd)}%;background:${STC[t.status]||'#cbd5e1'}" title="${esc(t.nama)} (${t.status||'-'})"></div></div></div>`;});
  return `<div class="gantt"><div class="gt-row"><div></div>${axis}</div>${rows}
    <div class="legend"><span><span class="dot" style="background:#16a34a"></span>tepat</span><span><span class="dot" style="background:#e0413a"></span>telat</span><span><span class="dot" style="background:#2f86d8"></span>berjalan</span><span><span class="dot" style="background:#f59e0b"></span>overdue</span><span><span class="dot" style="background:#94a3b8"></span>belum mulai</span></div></div>`;
}

  else if(a==='pegsort'){const k=el.dataset.k;state.pegSort=state.pegSort.k===k?{k,d:-state.pegSort.d}:{k,d:1};render();}

  document.getElementById('foot').innerHTML=`Keterlambatan dihitung ulang dari tanggal task; ${fmt(tk.anomali||0)} baris anomali (selesai &lt; mulai) dibuang; ${fmt(tk.tak_terukur||0)} task selesai tanpa tenggat ditandai tak terukur. Hierarki UE1/UE2 diturunkan dari jalur organisasi pegawai &amp; pemetaan pemilik kinerja. Skor indikatif = 60% penyelesaian + 40% ketepatan waktu.`;
  const YR=(s.tanggal_olah||'2026').slice(0,4);
  document.getElementById('appfoot').innerHTML=`<span>&copy; ${YR} Powered By <b>Donny Maha Putra</b> &middot; Prototipe</span><span class="r">Dashboard Mekanisme Kerja &middot; Biro Organisasi &amp; Ketatalaksanaan</span>`;
}
const APPS_URL='https://script.google.com/macros/s/AKfycbzwJTs6LLxVJ44kt6AmaPlLc9UV9K_eWQQZOpdrYAtn677QnM7Q2tOdqv58Os7e3I53/exec';async function authenticate(u,p){const url=APPS_URL+'?u='+encodeURIComponent(u)+'&p='+encodeURIComponent(p);const r=await fetch(url);const j=await r.json();if(!j||!j.ok)return null;DATA=j.data;return j.profil;}
async function doLogin(){
  const u=document.getElementById('luser').value.trim().toLowerCase();const p=document.getElementById('lpass').value;
  const errEl=document.getElementById('lerr');errEl.textContent='Memproses...';
  let prof;
  try{prof=await authenticate(u,p);}catch(e){errEl.textContent='Gagal terhubung ke server. Coba lagi.';return;}
  if(!prof){errEl.textContent='Username atau password salah.';return;}
  errEl.textContent='';
  document.getElementById('whoName').textContent=prof.nama;document.getElementById('whoName').title=prof.nama;
  document.getElementById('whoSub').textContent=prof.sub;document.getElementById('whoSub').title=prof.sub;
  document.getElementById('whoPic').textContent=initials(prof.nama);document.getElementById('whoPic2').textContent=initials(prof.nama);
  state.view='ringkasan';state.ue1=null;state.ue2=null;state.expanded={};
  document.getElementById('loginOverlay').style.display='none';
  setFooters();render();
}
document.getElementById('lbtn').onclick=doLogin;
document.getElementById('lpass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
document.getElementById('luser').focus();setFooters();
</script>
